async function fbSave(ref, data) {
  await ref.set({ data: JSON.stringify(data), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
}
function fbParse(snap) {
  if (!snap.exists) return null;
  try { return JSON.parse(snap.data().data || "null"); } catch(e) { return null; }
}

// ── Build Plan parser (from Excel upload) ────────────────────────────────────
function parseBuildPlan(workbook) {
  // Looks for sheet named "Database Query" first, falls back to first sheet
  const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes("database")) || workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
  if (raw.length < 2) return null;
  const header = raw[0].map(h => String(h || "").trim().toUpperCase());
  const col = (names) => { for (const n of names) { const i = header.indexOf(n); if (i >= 0) return i; } return -1; };
  const COL_ZONE     = col(["ZONE", "A"]) >= 0 ? col(["ZONE"]) : 0;
  const COL_RESOURCE = col(["RESOURCE_ID", "RESOURCE"]) >= 0 ? col(["RESOURCE_ID", "RESOURCE"]) : 1;
  const COL_CREW     = col(["CREW_SIZE", "CREW"]) >= 0 ? col(["CREW_SIZE", "CREW"]) : 2;
  const COL_TOOL     = col(["TOOL_ID", "TOOL"]) >= 0 ? col(["TOOL_ID", "TOOL"]) : 3;
  const COL_WO       = col(["WORKORDER", "WO"]) >= 0 ? col(["WORKORDER", "WO"]) : 4;
  const COL_PART     = col(["PART", "PART_NUM"]) >= 0 ? col(["PART", "PART_NUM"]) : 5;
  const COL_DESCR    = col(["PART_DESCR", "DESCRIPTION", "DESCR"]) >= 0 ? col(["PART_DESCR", "DESCRIPTION", "DESCR"]) : 6;
  const COL_LABR     = col(["LABR_HRS", "LABOUR_HRS"]) >= 0 ? col(["LABR_HRS", "LABOUR_HRS"]) : 7;
  const COL_RUN      = col(["RUN_HRS"]) >= 0 ? col(["RUN_HRS"]) : 8;
  const COL_STARTQTY = col(["START_QTY", "QTY"]) >= 0 ? col(["START_QTY", "QTY"]) : 9;
  const COL_COMPQTY  = col(["COMP_QTY"]) >= 0 ? col(["COMP_QTY"]) : 10;

  // We need leader mapping — load from current BUILD_DATA if available, else blank
  const leaderMap = {};
  if (typeof BUILD_DATA !== "undefined") {
    for (const r of BUILD_DATA.rows) leaderMap[r.resource] = r.leader;
  }

  const rows = [];
  for (let i = 1; i < raw.length; i++) {
    const r = raw[i];
    const resource = String(r[COL_RESOURCE] || "").trim();
    const wo = String(r[COL_WO] || "").trim();
    if (!resource || !wo) continue;
    const compRaw = r[COL_COMPQTY];
    const compQty = typeof compRaw === "number" ? compRaw : (parseInt(compRaw) || 0);
    rows.push({
      resource,
      leader: leaderMap[resource] || "",
      tool_id: String(r[COL_TOOL] || "").trim() || null,
      wo,
      part: String(r[COL_PART] || "").trim(),
      descr: String(r[COL_DESCR] || "").trim(),
      run_hrs: parseFloat(r[COL_RUN]) || 0,
      start_qty: parseInt(r[COL_STARTQTY]) || 0,
      comp_qty: compQty,
      status: compQty > 0 && compQty >= (parseInt(r[COL_STARTQTY]) || 0) ? "done" : "todo",
    });
  }
  return rows.length > 0 ? rows : null;
}

// ── Labour tickets parser → WO comp_qty map ──────────────────────────────────
// Sums GOOD_QTY per WO (stripping /1 suffix to match BuildTracker WO keys).
// Returns { "W1027135": 1500, ... }
function parseLabourTicketsForWOs(workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
  if (raw.length < 2) return {};
  const header = raw[0].map(h => String(h || "").trim().toUpperCase());
  const col = (names, fallback) => { for (const n of names) { const i = header.indexOf(n); if (i >= 0) return i; } return fallback; };
  const COL_WO  = col(["WORKORDER_ID", "WORKORDER", "WO", "WORK_ORDER"], 10);
  const COL_QTY = col(["GOOD_QTY", "QTY", "UNITS"], 7);
  const totals = {};
  for (let i = 1; i < raw.length; i++) {
    const r = raw[i];
    const rawWo = String(r[COL_WO] || "").trim();
    if (!rawWo) continue;
    const qty = parseFloat(r[COL_QTY]) || 0;
    if (qty > 0) totals[rawWo] = (totals[rawWo] || 0) + qty;
  }
  return totals;
}

// ============ Shifts ============
// Shift schedule:
//   1: 11pm–7am (overnight) — wall-clock window [23, 24) ∪ [0, 7)
//   2: 7am–3pm (day)
//   3: 3pm–11pm (evening)
// Grace window: 1 hour past end of a shift, the system still defaults to that ended shift
// (lets supervisors log the shift they just finished).
const SHIFTS = [
  { id: 1, label: "Shift 1", time: "11pm–7am" },
  { id: 2, label: "Shift 2", time: "7am–3pm" },
  { id: 3, label: "Shift 3", time: "3pm–11pm" },
];
// Returns { shiftId, shiftDate } where shiftDate is the calendar date that "owns" this shift.
// (For Shift 1 in early-morning hours, the shift began the previous evening.)
const getCurrentShift = (date = new Date()) => {
  const h = date.getHours() + date.getMinutes() / 60;
  // 1-hour grace: shift "just ended" still defaults to that shift
  // Active windows + grace:
  // Shift 1 active: 23:00–06:59, grace until 07:59
  // Shift 2 active: 07:00–14:59, grace until 15:59
  // Shift 3 active: 15:00–22:59, grace until 23:59 (already covers full window)
  let shiftId, shiftDate = new Date(date);
  shiftDate.setHours(0, 0, 0, 0);
  if (h >= 7 && h < 16) shiftId = 2;       // Shift 2 active or just ended
  else if (h >= 16 && h < 23) shiftId = 3; // Shift 3 active
  else {
    // Shift 1 (overnight). Owns date = the *evening start* date.
    shiftId = 1;
    if (h < 8) {
      // Early morning — shift started yesterday evening
      shiftDate.setDate(shiftDate.getDate() - 1);
    }
    // h >= 23 — shift just started this evening, shiftDate = today (already correct)
  }
  return { shiftId, shiftDate };
};
// Build a shift entry key for sorting/comparison: "YYYY-MM-DD#S"
const shiftEntryKey = (date, shiftId) => {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}#${shiftId}`;
};
// Pretty-print a shift entry timestamp
const shiftLabel = (entry) => {
  const meta = SHIFTS.find(s => s.id === entry.shiftId) || SHIFTS[0];
  const d = new Date(entry.shiftDateISO);
  const dStr = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  return `${dStr} · ${meta.label} (${meta.time})`;
};

// ============ Calendar projection ============
// Production runs Mon-Fri. Each line has its own daily window:
//   - 24h lines: 00:00 → 24:00 (continuous)
//   - 16h lines: 07:00 → 23:00 (no overnight)
// Weekends are always skipped.

// Per-line shift coverage. Default = 24h.
const SHIFT_COVERAGE = {
  // 16h: 7am-11pm, no overnight
  "LoPro S3 HDMI":   { startHour: 7, endHour: 23 },
  "Lopro QC Mix":    { startHour: 7, endHour: 23 },
  "Lopro HDMI Mix":  { startHour: 7, endHour: 23 },
  // others omitted = 24h continuous
};
const DEFAULT_COVERAGE = { startHour: 0, endHour: 24 };
const coverageFor = (resource) => SHIFT_COVERAGE[resource] || DEFAULT_COVERAGE;

const HOUR_MS = 60 * 60 * 1000;
const isWeekend = (d) => d.getDay() === 6 || d.getDay() === 0;
const skipToNextMonday = (d) => {
  const r = new Date(d);
  r.setHours(0, 0, 0, 0);
  while (isWeekend(r)) r.setDate(r.getDate() + 1);
  return r;
};

// Roll a wall-clock date forward to the next valid production minute given coverage.
// Skips weekends, and for limited-coverage lines, skips the off-hours.
const skipToProductionTime = (d, cov) => {
  let cur = new Date(d);
  if (isWeekend(cur)) cur = skipToNextMonday(cur);
  // If cov is full 24h, no further adjustment needed
  if (cov.startHour === 0 && cov.endHour === 24) return cur;
  // Otherwise: snap to production window
  const hour = cur.getHours() + cur.getMinutes() / 60;
  if (hour < cov.startHour) {
    cur.setHours(cov.startHour, 0, 0, 0);
  } else if (hour >= cov.endHour) {
    // Past today's window — go to tomorrow's start
    cur.setDate(cur.getDate() + 1);
    cur.setHours(cov.startHour, 0, 0, 0);
    if (isWeekend(cur)) {
      cur = skipToNextMonday(cur);
      cur.setHours(cov.startHour, 0, 0, 0);
    }
  }
  return cur;
};

// projectDate(hours, fromTime, coverage): map a production-hour offset to wall-clock,
// starting from fromTime, given a coverage window.
const projectDate = (hours, fromTime, coverage = DEFAULT_COVERAGE) => {
  let cur = skipToProductionTime(fromTime, coverage);
  let remaining = hours;
  let safety = 0;
  while (remaining > 0 && safety++ < 1000) {
    cur = skipToProductionTime(cur, coverage);
    // Compute end of today's production window
    const endOfWindow = new Date(cur);
    if (coverage.endHour === 24) {
      endOfWindow.setHours(0, 0, 0, 0);
      endOfWindow.setDate(endOfWindow.getDate() + 1);
    } else {
      endOfWindow.setHours(coverage.endHour, 0, 0, 0);
    }
    const hoursLeftInWindow = (endOfWindow - cur) / HOUR_MS;
    if (remaining <= hoursLeftInWindow) {
      cur = new Date(cur.getTime() + remaining * HOUR_MS);
      remaining = 0;
    } else {
      remaining -= hoursLeftInWindow;
      cur = endOfWindow;
    }
  }
  return cur;
};
// Produce calendar segments from h=0 to h=maxHours, splitting at calendar-day boundaries.
const calendarSegments = (maxHours, fromTime, coverage = DEFAULT_COVERAGE) => {
  if (maxHours <= 0) return [];
  const segs = [];
  const startDate = projectDate(0, fromTime, coverage);
  let segStart = 0;
  let segDate = startDate;
  let segDayKey = startDate.toDateString();
  const STEP = 0.25;
  for (let h = STEP; h <= maxHours + STEP; h += STEP) {
    const d = projectDate(h, fromTime, coverage);
    const key = d.toDateString();
    if (key !== segDayKey) {
      segs.push({ startH: segStart, endH: h, date: segDate });
      segStart = h;
      segDate = d;
      segDayKey = key;
    }
  }
  segs.push({ startH: segStart, endH: maxHours, date: segDate });
  return segs;
};
// Compute off-shift intervals for a line, expressed in shared-timeline production-hours.
// For limited-coverage lines (e.g. 16h, 7am-11pm), returns the wall-clock 11pm-7am gaps
// projected onto the shared 24h timeline. Returns [] for 24h lines.
const offShiftIntervals = (maxHours, fromTime, coverage) => {
  if (coverage.startHour === 0 && coverage.endHour === 24) return [];
  const intervals = [];
  const STEP = 0.25;
  let segStart = null;
  for (let h = 0; h <= maxHours + STEP; h += STEP) {
    const d = projectDate(h, fromTime, DEFAULT_COVERAGE);
    const hourOfDay = d.getHours() + d.getMinutes() / 60;
    const isOff = hourOfDay < coverage.startHour || hourOfDay >= coverage.endHour;
    if (isOff && segStart === null) segStart = h;
    else if (!isOff && segStart !== null) {
      intervals.push({ startH: segStart, endH: Math.min(h, maxHours) });
      segStart = null;
    }
  }
  if (segStart !== null) intervals.push({ startH: segStart, endH: maxHours });
  return intervals;
};
const sameYMD = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
const dayLabel = (date, today) => {
  if (sameYMD(date, today)) return "Today";
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  if (sameYMD(date, tomorrow)) return "Tomorrow";
  return date.toLocaleDateString(undefined, { weekday: "short" });
};

function BuildTracker() {

  const resourceLeaderMap = useMemo(() => {

    }

  }, []);

  // ── Live build plan from Firestore (falls back to BUILD_DATA if none uploaded) ──
  const [buildPlanRows, setBuildPlanRows] = useState(null); // null = use BUILD_DATA
  useEffect(() => {
    const unsub = BT_BUILDPLAN_REF.onSnapshot(snap => {
      const data = fbParse(snap);
      if (data && data.rows && data.rows.length > 0) {
        // Inject leader from resource map, sanitize comp_qty
        const rows = data.rows.map((r, idx) => ({
          ...r,
          _idx: idx,
          leader: resourceLeaderMap[r.resource] || r.leader || "",

    });

  }, [resourceLeaderMap]);

  // ── Real-time overrides listener ──────────────────────────────────────────
  useEffect(() => {
    const unsub = BT_OVERRIDES_REF.onSnapshot(snap => {
      const parsed = fbParse(snap);
      setOverrides(parsed || {});
      setFbStatus("live");
      setLastSync(new Date());
    }, err => {
      console.error("Overrides listener:", err);
      try { const s = localStorage.getItem(STORAGE_KEY); if (s) setOverrides(JSON.parse(s)); } catch(e) {}
      setFbStatus("error");
    });
    return () => unsub();
  }, []);

  const saveOverrides = useCallback(async (next) => {
    setOverrides(next);
    try { await fbSave(BT_OVERRIDES_REF, next); }
    catch(e) { console.error("Save overrides:", e); localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); }
  }, []);

  // ── Build Plan upload handler ─────────────────────────────────────────────
  const handleBuildPlanUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus({ type: "build", msg: "Parsing build plan…", ok: null });
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), { type: "array" });
        const rows = parseBuildPlan(wb);
        if (!rows) { setUploadStatus({ type: "build", msg: "No rows found — check sheet name 'Database Query'", ok: false }); return; }
        await fbSave(BT_BUILDPLAN_REF, { rows, fileName: file.name, uploadedAt: new Date().toISOString() });
        setUploadStatus({ type: "build", msg: `✓ Build plan saved · ${rows.length} WOs · reload to apply`, ok: true });
      } catch(err) {
        setUploadStatus({ type: "build", msg: "Error: " + err.message, ok: false });
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  // ── Labour tickets upload handler ─────────────────────────────────────────
  // Parses the same Excel file as Production Report Tool.
  // 1. Saves full row data to production_data/latest (shared with Production Report)
  // 2. Extracts WO totals → updates comp_qty overrides for matched BuildTracker WOs
  const handleLabourUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus({ type: "labour", msg: "Parsing labour tickets…", ok: null });
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), { type: "array" });
        // Get WO totals for BuildTracker comp_qty matching
        const woTotals = parseLabourTicketsForWOs(wb);
        const matchedWOs = Object.keys(woTotals);
        // Match against current BUILD_DATA rows
        // BuildTracker WO keys: "W1027135/1" → base: "W1027135"
        let matchCount = 0;
        const currentOverrides = overrides;
        const nextOverrides = { ...currentOverrides };


        const sourceRows = buildPlanRows || BUILD_DATA.rows;
        sourceRows.forEach((row, idx) => {
          if (woTotals[row.wo] !== undefined) {
            const key = rowKey({ ...row, _idx: idx });
            const existing = nextOverrides[key] || {};
            const newQty = woTotals[row.wo];
            const startQty = row.start_qty || 0;
            // Auto-set status: done if qty met, wip if partial, keep existing if already post-production
            const currentStatus = existing.status || row.status;
            let newStatus = currentStatus;
            if (!POST_PRODUCTION_STATUSES.has(currentStatus)) {
              if (startQty > 0 && newQty >= startQty) newStatus = "done";
              else if (newQty > 0) newStatus = "wip";
            }
            nextOverrides[key] = { ...existing, comp_qty: newQty, status: newStatus, _updatedAt: new Date().toISOString() };
            matchCount++;
          }
        });
        await fbSave(BT_OVERRIDES_REF, nextOverrides);
        // Also save full rows to shared production_data doc for Production Report Tool
        const sheetName = wb.SheetNames[0];
        const sheet = wb.Sheets[sheetName];
        const allRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        await LABOUR_TICKETS_REF.set({
          rows: allRows.slice(1).map(r => ({
            wo: String(r[10] || "").trim(),
            qty: parseFloat(r[7]) || 0,
            date: String(r[2] || "").trim(),
          })),
          uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
          fileName: file.name,
        });
        setUploadStatus({ type: "labour", msg: `✓ Labour tickets saved · ${matchCount} WOs updated · ${matchedWOs.length} unique WOs in file`, ok: true });
      } catch(err) {
        setUploadStatus({ type: "labour", msg: "Error: " + err.message, ok: false });
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  const allRows = useMemo(() => {
    const sourceRows = buildPlanRows || BUILD_DATA.rows;
    const rows = sourceRows.map((r, idx) => {
      const tagged = { ...r, _idx: idx, comp_qty: parseFloat(r.comp_qty) || 0 };
      const o = overrides[rowKey(tagged)];
      return o ? { ...tagged, ...o, comp_qty: parseFloat(o.comp_qty ?? tagged.comp_qty) || 0, _override: true } : tagged;
    });

    // Auto-tool inheritance: if a todo WO has the same tool_id as any currently-active
    // (WIP/abr/brs) WO on the same line, the tool is already in the machine — so we
    // synthetically mark Tool as ready. The "auto: true" flag distinguishes this from
    // a manual check so the UI can render it differently.
    //
    // Manual overrides always win — if the user has clicked the Tool button (either to
    // mark ok or not-ok), we leave it alone. Auto only applies when no manual data exists.
    //
    // Build a set of (resource, tool_id) pairs currently in-machine, then loop again
    // to apply the synthetic readiness.
    const activeToolsByLine = new Map(); // resource -> Set of tool_ids
    for (const r of rows) {
      if (!r.tool_id) continue;
      if (r.status === "wip" || r.status === "abr" || r.status === "brs") {
        if (!activeToolsByLine.has(r.resource)) activeToolsByLine.set(r.resource, new Set());
        activeToolsByLine.get(r.resource).add(r.tool_id);
      }
    }
    return rows.map(r => {
      if (r.status !== "todo") return r;
      // Skip if user already has manual tool readiness data
      if (r.readiness && r.readiness.tool !== undefined) return r;
      // No tool required for this WO — auto-mark as ready (N/A case)
      if (!r.tool_id) {
        return {
          ...r,
          readiness: {
            ...(r.readiness || {}),
            tool: { ok: true, auto: true, na: true, ts: new Date().toISOString() },
          },
        };
      }
      // Skip if no matching active tool on this line
      const activeSet = activeToolsByLine.get(r.resource);
      if (!activeSet || !activeSet.has(r.tool_id)) return r;
      // Apply synthetic auto-ready (same tool already running on line)
      return {
        ...r,
        readiness: {
          ...(r.readiness || {}),
          tool: { ok: true, auto: true, ts: new Date().toISOString() },
        },
      };
    });
  }, [overrides, buildPlanRows]);

  // Unit Leader picker state — defaults to Andrew B. for the launch.
  // Persists in localStorage so each device remembers its leader.
  const LEADER_STORAGE = "build_tracker_leader";
  const [selectedLeader, setSelectedLeader] = useState("Andrew B.");
  useEffect(() => {
    try {
      const stored = localStorage.getItem(LEADER_STORAGE);
      if (stored) setSelectedLeader(stored);
    } catch {}
  }, []);
  const changeLeader = (name) => {
    setSelectedLeader(name);
    try { localStorage.setItem(LEADER_STORAGE, name); } catch {}
  };

  // Presentation mode keyboard exit (Escape)
  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") setPresentationMode(false); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, []);

  // Running lines filter
  const [lineFilter, setLineFilter] = useState("all"); // "all" | "running" | "running_down"

  // User initials — soft attribution (not security). Asks once per device,
  // stamps every action so we know who did what for shift reports.
  const INITIALS_STORAGE = "build_tracker_initials";
  const [userInitials, setUserInitials] = useState("");
  const [showInitialsModal, setShowInitialsModal] = useState(false);
  useEffect(() => {
    try {
      const stored = localStorage.getItem(INITIALS_STORAGE);
      if (stored) setUserInitials(stored);
      else setShowInitialsModal(true);
    } catch {}
  }, []);
  const saveInitials = (initials) => {
    const clean = (initials || "").trim().toUpperCase().slice(0, 4);
    if (!clean) return;
    setUserInitials(clean);
    setShowInitialsModal(false);
    try { localStorage.setItem(INITIALS_STORAGE, clean); } catch {}
  };

  // Line-down tracking — synced via Firebase so all devices see it live.
  const LINE_DOWN_STORAGE = "build_tracker_line_down";
  const [lineDown, setLineDown] = useState({});
  useEffect(() => {
    const unsub = BT_LINEDOWN_REF.onSnapshot(snap => {
      setLineDown(fbParse(snap) || {});
    }, err => {
      console.error("LineDown listener:", err);
      try { const s = localStorage.getItem(LINE_DOWN_STORAGE); if (s) setLineDown(JSON.parse(s)); } catch(e) {}
    });
    return () => unsub();
  }, []);
  const saveLineDown = async (next) => {
    setLineDown(next);
    try { await fbSave(BT_LINEDOWN_REF, next); }
    catch(e) { localStorage.setItem(LINE_DOWN_STORAGE, JSON.stringify(next)); }
  };
  const markLineDown = (resource, { shiftId, shiftDate, reason, notes }) => {
    const existing = lineDown[resource] || [];
    const targetKey = shiftEntryKey(shiftDate, shiftId);
    // Replace if entry for the same shift already exists
    const filtered = existing.filter(e => shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) !== targetKey);
    const next = {
      ...lineDown,
      [resource]: [
        ...filtered,
        {
          shiftDateISO: shiftDate.toISOString(),
          shiftId,
          reason: reason || "",
          notes: notes || "",
          by: userInitials || "",
          loggedAt: new Date().toISOString(),
        },
      ],
    };
    saveLineDown(next);
  };
  const unmarkLineDown = (resource, shiftId, shiftDate) => {
    const existing = lineDown[resource] || [];
    const targetKey = shiftEntryKey(shiftDate, shiftId);
    const filtered = existing.filter(e => shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) !== targetKey);
    const next = { ...lineDown };
    if (filtered.length === 0) delete next[resource]; else next[resource] = filtered;
    saveLineDown(next);
  };
  // Returns the down entry for a resource on a given shift, or null
  const getLineDownEntry = (resource, shiftId, shiftDate) => {
    const entries = lineDown[resource] || [];
    const targetKey = shiftEntryKey(shiftDate, shiftId);
    return entries.find(e => shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) === targetKey) || null;
  };
  // Derive the list of leaders present in the data, ordered by WO count (descending).
  const leaderList = useMemo(() => {
    const counts = new Map();
    for (const r of BUILD_DATA.rows) {
      counts.set(r.leader, (counts.get(r.leader) || 0) + 1);
    }
    return [...counts.entries()].sort((a, b) => b[1] - a[1]).map(([name, count]) => ({ name, count }));
  }, []);

  // Production-active = todo/wip only. ABR/BRS shown in strips, not in timeline top-3.
  const lines = useMemo(() => {
    // Derive ordered list of unique resources for the selected leader.
    const seen = new Set();
    const ordered = [];
    for (const r of allRows) {
      if (r.leader === selectedLeader && !seen.has(r.resource)) {
        seen.add(r.resource);
        ordered.push(r.resource);
      }
    }
    return ordered.map(res => {
      const allInResource = allRows.filter(r => r.resource === res).sort((a, b) => a._idx - b._idx);
      const productionActive = allInResource.filter(r => !POST_PRODUCTION_STATUSES.has(r.status));
      const top3 = productionActive.slice(0, 3);
      const totalHrs = top3.reduce((s, r) => s + (r.run_hrs || 0), 0);
      return {
        resource: res,
        rows: top3,
        totalActive: productionActive.length,
        doneCount: allInResource.length - productionActive.length,
        totalHrs,
      };
    }).filter(l => {
      if (l.rows.length === 0) return false;
      if (lineFilter === "all") return true;
      const hasWip = l.rows.some(r => r.status === "wip");
      if (lineFilter === "running") return hasWip;
      if (lineFilter === "running_down") {
        const { shiftId, shiftDate } = getCurrentShift(new Date());
        const isDown = ((lineDown[l.resource] || []).find(e =>
          shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) === shiftEntryKey(shiftDate, shiftId)
        )) ? true : false;
        return hasWip || isDown;
      }
      return true;
    });
  }, [allRows, selectedLeader]);

  // ABR + BRS lists (across all the leader's lines, not just top 3)
  const allLeaderActive = useMemo(() => {
    return allRows.filter(r => r.leader === selectedLeader && r.status !== "done");
  }, [allRows, selectedLeader]);
  const abrList = useMemo(() => allLeaderActive.filter(r => r.status === "abr"), [allLeaderActive]);
  const brsList = useMemo(() => allLeaderActive.filter(r => r.status === "brs"), [allLeaderActive]);

  const queueLayout = useMemo(() => {
    const layout = new Map();
    let maxEnd = 0;
    for (const line of lines) {
      let cursor = 0;
      const items = line.rows.map(r => {
        const start = cursor;
        const length = Math.max(0, r.run_hrs || 0);
        cursor += length;
        return { row: r, start, length };
      });
      maxEnd = Math.max(maxEnd, cursor);
      layout.set(line.resource, { items, total: cursor });
    }
    return { layout, maxHours: maxEnd };
  }, [lines]);

  const stats = useMemo(() => {
    const flat = lines.flatMap(l => l.rows);

    const notReady = flat.filter(r => r.status === "todo" && !isReady(r)).length;
    // "Next not ready" = WOs in the NEXT slot (position 1) of each line that are todo + not ready.
    // These are the most urgent because they're the next thing to start once NOW finishes.
    const nextNotReadyList = [];
    for (const l of lines) {
      const nextRow = l.rows[1]; // POS_LABELS = ['NOW', 'NEXT', 'THEN'] → index 1 = NEXT
      if (nextRow && nextRow.status === "todo" && !isReady(nextRow)) {
        // Attach the NOW WO's remaining run_hrs so modal can show urgency
        const nowRow = l.rows[0];
        const nowHrs = nowRow ? (nowRow.run_hrs || 0) : 0;
        nextNotReadyList.push({ ...nextRow, _nowRunHrs: nowHrs });
      }
    }
    return {
      lines: lines.length,
      wip: flat.filter(r => r.status === "wip").length,
      abr: abrList.length,
      brs: brsList.length,
      activeWO: flat.length,
      hrsShown: flat.reduce((s, r) => s + (r.run_hrs || 0), 0),

      notReady,
      nextNotReady: nextNotReadyList.length,
      nextNotReadyList,
    };
  }, [lines, abrList, brsList]);

  // Build "materials needed in next 36h" lists — one per readiness category.
  // For each line, walk the FULL active queue (not just top 3) cumulatively to figure out
  // when each WO would start. If a WO starts within 36h and is missing a readiness check,
  // include it in that category's list. Tool list excludes WOs auto-covered by inheritance.
  const upcomingNotReady = useMemo(() => {
    const WINDOW_HOURS = 36;
    const now = new Date();
    const cutoff = projectDate(WINDOW_HOURS, now, DEFAULT_COVERAGE);
    const lists = { tool: [], labels: [], kit: [] };
    const byResource = new Map();
    for (const r of allRows) {
      if (r.leader !== selectedLeader) continue;
      if (POST_PRODUCTION_STATUSES.has(r.status)) continue;
      if (!byResource.has(r.resource)) byResource.set(r.resource, []);
      byResource.get(r.resource).push(r);
    }
    for (const [res, rows] of byResource.entries()) {
      rows.sort((a, b) => a._idx - b._idx);
      let cursor = 0;
      let prevToolId = null; // track previous WO's tool to detect changeovers
      for (const r of rows) {
        const wallClock = projectDate(cursor, now, DEFAULT_COVERAGE);
        if (wallClock > cutoff) break;
        if (r.status === "todo") {
          const readiness = r.readiness || {};
          const entry = { row: r, startsAt: wallClock, startsInHrs: cursor };
          // Tool: only flag if not already OK AND it's a real changeover
          // (tool_id differs from the previous WO's tool, or no tool on previous WO)
          const isChangeover = r.tool_id && r.tool_id !== prevToolId;
          if (!readiness.tool?.ok && isChangeover) lists.tool.push(entry);
          if (!readiness.labels?.ok) lists.labels.push(entry);
          if (!readiness.kit?.ok) lists.kit.push(entry);
        }
        // Update prevToolId from this WO (regardless of status — WIP sets the "current" tool)
        if (r.tool_id) prevToolId = r.tool_id;
        cursor += r.run_hrs || 0;
        if (cursor > WINDOW_HOURS) break;
      }
    }
    return lists;
  }, [allRows, selectedLeader]);

  const [materialsModal, setMaterialsModal] = useState(null); // "tool" | "labels" | "kit" | null


  const updateRow = (row, changes) => {
    const key = rowKey(row);
    let merged = { ...(overrides[key] || {}), ...changes, _updatedAt: new Date().toISOString() };
    const resultStatus = merged.status ?? row.status;
    const resultCompQty = merged.comp_qty != null ? merged.comp_qty : row.comp_qty;
    const startQty = row.start_qty;

    // Readiness gate: block any transition INTO "wip" if the WO isn't ready.
    // Apply to result-after-merge so we catch both manual flips and auto-transitions.
    const wantsWip = resultStatus === "wip" && row.status !== "wip";
    const merged_for_ready_check = { ...row, ...merged };
    if (wantsWip && !isReady(merged_for_ready_check)) {
      // Refuse the transition. Keep status as it was.
      delete merged.status;
      // If the user was clicking the WIP button, this will silently no-op.
      // The detail panel disables the button when not ready, so user shouldn't hit this.
      // For auto-transition (qty entered while still todo + not ready), we skip the auto.
    }

    if (changes.comp_qty != null && changes.status == null) {
            // If qty meets or exceeds start_qty → move to ABR
      if (startQty > 0 && resultCompQty >= startQty && !POST_PRODUCTION_STATUSES.has(merged.status ?? row.status)) {
        merged.status = "abr";
      } else if (resultCompQty > 0 && (merged.status ?? row.status) === "todo" && isReady(merged_for_ready_check)) {
        merged.status = "wip";
      }
    }

    const next = { ...overrides, [key]: merged };
    saveOverrides(next);
    if (selectedWo && rowKey(selectedWo) === key) {
      setSelectedWo({ ...row, ...merged, _override: true });
    }
  };

  const setReadinessCheck = (row, kind, ok) => {
    const cur = row.readiness || {};
    const newReadiness = {
      ...cur,
      [kind]: ok
        ? { ok: true, ts: new Date().toISOString(), by: userInitials || "" }
        : { ok: false, ts: new Date().toISOString(), by: userInitials || "" },
    };
    updateRow(row, { readiness: newReadiness });
  };

  // Log a shift entry. Adds qty (delta) to comp_qty and appends to shifts history.
  // Adds qty delta to comp_qty and triggers status transitions via updateRow.
  const logShiftEntry = (row, { shiftId, shiftDate, qty, notes, reason }) => {
    const existingShifts = row.shifts || [];
    const newShifts = [
      ...existingShifts,
      {
        shiftId,
        shiftDateISO: shiftDate.toISOString(),
        qty: Number(qty) || 0,
        notes: notes || "",
        reason: reason || "",
        by: userInitials || "",
        loggedAt: new Date().toISOString(),
      },
    ];
    const currentComp = row.comp_qty || 0;
    const newComp = Math.min(row.start_qty || 0, currentComp + (Number(qty) || 0));
    updateRow(row, { shifts: newShifts, comp_qty: newComp });
  };

  const resetAllOverrides = () => {
    if (confirm(`Reset all ${Object.keys(overrides).length} updates? This clears data for ALL users.`)) saveOverrides({});
  };

  const exportOverrides = () => {
    const out = ["resource,workorder,new_status,new_comp_qty,updated_at"];
    for (const [key, ov] of Object.entries(overrides)) {
      const src = allRows.find(r => rowKey(r) === key);
      if (!src) continue;
      const newCompQty = ov.comp_qty != null ? ov.comp_qty : src.comp_qty;
      out.push([src.resource, src.wo || "", ov.status || src.status, newCompQty, ov._updatedAt || ""]
        .map(x => `"${String(x).replace(/"/g, '""')}"`).join(","));
    }
    const blob = new Blob([out.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = `build_updates_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const overrideCount = Object.keys(overrides).length;
  const selectedKey = selectedWo ? rowKey(selectedWo) : null;

  // Measure heights of sticky bars (header + closeout strips) so the timeline's
  // calendar/axis can stick BELOW them, and so the BRS strip can stick below the ABR strip.
  const headerRef = useRef(null);
  const abrRef = useRef(null);
  const brsRef = useRef(null);
  const [stickyH, setStickyH] = useState({ header: 0, abr: 0, brs: 0 });
  useEffect(() => {
    const measure = () => {
      const h = headerRef.current?.getBoundingClientRect().height || 0;
      const a = abrRef.current?.getBoundingClientRect().height || 0;
      const b = brsRef.current?.getBoundingClientRect().height || 0;
      setStickyH({ header: h, abr: a, brs: b });
    };
    measure();
    const t1 = setTimeout(measure, 50);
    const t2 = setTimeout(measure, 300);
    window.addEventListener("resize", measure);
    return () => { clearTimeout(t1); clearTimeout(t2); window.removeEventListener("resize", measure); };
  }, [abrList.length, brsList.length]);
  const totalStickyTop = stickyH.header + stickyH.abr + stickyH.brs;

  const [showShiftReport, setShowShiftReport] = useState(false);
  const [lineDownTarget, setLineDownTarget] = useState(null); // resource name or null
  const [showNextNotReady, setShowNextNotReady] = useState(false);

  // ── Presentation Mode ─────────────────────────────────────────────────────
  const [tvExcluded, setTvExcluded] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bt_tv_excluded") || "[]"); } catch(e) { return []; }
  });
  const [showTvConfig, setShowTvConfig] = useState(false);

  const saveTvExcluded = (list) => {
    setTvExcluded(list);
    try { localStorage.setItem("bt_tv_excluded", JSON.stringify(list)); } catch(e) {}
  };

  const tvLines = useMemo(() => lines.filter(l => !tvExcluded.includes(l.resource)), [lines, tvExcluded]);

  if (presentationMode) {
    const now = new Date();
    const { shiftId: curShift, shiftDate: curShiftDate } = getCurrentShift(now);
    const colCount = tvLines.length <= 6 ? 2 : tvLines.length <= 12 ? 3 : tvLines.length <= 20 ? 4 : 5;

    return (
      <div style={{ width: "100vw", height: "100vh", overflow: "hidden", background: "#0f172a", color: "white", fontFamily: "ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif", display: "flex", flexDirection: "column" }}>
        {/* Exit — invisible until hover */}
        <button onClick={() => setPresentationMode(false)}
          style={{ position: "fixed", top: 8, right: 8, zIndex: 50, opacity: 0.1, padding: "2px 8px", background: "rgba(255,255,255,0.2)", border: "none", color: "white", borderRadius: 4, cursor: "pointer", fontSize: 11 }}
          onMouseEnter={e => e.target.style.opacity = 0.8} onMouseLeave={e => e.target.style.opacity = 0.1}
        >✕ Exit (Esc)</button>

        {/* Config button */}
        <button onClick={() => setShowTvConfig(v => !v)}
          style={{ position: "fixed", top: 8, left: 8, zIndex: 50, opacity: 0.1, padding: "2px 8px", background: "rgba(255,255,255,0.2)", border: "none", color: "white", borderRadius: 4, cursor: "pointer", fontSize: 11 }}
          onMouseEnter={e => e.target.style.opacity = 0.8} onMouseLeave={e => e.target.style.opacity = 0.1}
        >⚙ Lines</button>

        {/* Line exclusion config panel */}
        {showTvConfig && (
          <div style={{ position: "fixed", top: 36, left: 8, zIndex: 50, background: "#1e293b", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8, padding: 12, width: 220, maxHeight: "80vh", overflowY: "auto" }}>
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: "rgba(255,255,255,0.5)", marginBottom: 8 }}>Hide from TV</div>
            {lines.map(l => (
              <label key={l.resource} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0", cursor: "pointer", fontSize: 12 }}>
                <input type="checkbox" checked={tvExcluded.includes(l.resource)}
                  onChange={e => {
                    const next = e.target.checked
                      ? [...tvExcluded, l.resource]
                      : tvExcluded.filter(x => x !== l.resource);
                    saveTvExcluded(next);
                  }}
                />
                <span style={{ color: tvExcluded.includes(l.resource) ? "rgba(255,255,255,0.3)" : "white" }}>{l.resource}</span>
              </label>
            ))}
            <button onClick={() => setShowTvConfig(false)}
              style={{ marginTop: 10, width: "100%", padding: "4px 0", background: "rgba(255,255,255,0.1)", border: "none", color: "white", borderRadius: 4, cursor: "pointer", fontSize: 11 }}>
              Done
            </button>
          </div>
        )}

        {/* Compact header — single row */}
        <div style={{ padding: "6px 16px", borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontWeight: 800, fontSize: 18 }}>{buName(selectedLeader)}</span>
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{tvLines.length} lines</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
            <span style={{ color: "#f59e0b", fontWeight: 700, fontSize: 15 }}>{stats.wip} WIP</span>
            {stats.nextNotReady > 0 && <span style={{ color: "#f87171", fontWeight: 700, fontSize: 15 }}>⚠ {stats.nextNotReady} Not Ready</span>}
            <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 13, fontFamily: "monospace" }}>{now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>
          </div>
        </div>

        {/* Lines grid — fills remaining height exactly */}
        <div style={{ flex: 1, display: "grid", gridTemplateColumns: `repeat(${colCount}, 1fr)`, gap: 6, padding: 6, overflow: "hidden", alignContent: "start" }}>
          {tvLines.map(line => {
            const isDown = ((lineDown[line.resource] || []).find(e =>
              shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) === shiftEntryKey(curShiftDate, curShift)
            )) ? true : false;
            const nowRow = line.rows[0];
            const hasWip = line.rows.some(r => r.status === "wip");
            const hasNotReady = line.rows.some(r => r.status === "todo" && !isReady(r));

            // Remaining hours on NOW WO
            let remainHrs = null;
            if (nowRow && nowRow.start_qty > 0 && nowRow.run_hrs > 0) {
              const pct = Math.min(1, (nowRow.comp_qty || 0) / nowRow.start_qty);
              remainHrs = nowRow.run_hrs * (1 - pct);
            }

            const borderColor = isDown ? "#ef4444" : hasNotReady ? "#f87171" : hasWip ? "#f59e0b" : "rgba(255,255,255,0.08)";
            const bgColor = isDown ? "rgba(239,68,68,0.12)" : hasWip ? "rgba(245,158,11,0.08)" : "rgba(255,255,255,0.03)";

            return (
              <div key={line.resource} style={{ border: `1px solid ${borderColor}`, borderRadius: 8, padding: "6px 8px", background: bgColor, display: "flex", flexDirection: "column", gap: 3, minHeight: 0 }}>
                {/* Line name + badges */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 4 }}>
                  <span style={{ fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{line.resource}</span>
                  <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
                    {isDown && <span style={{ fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, background: "#dc2626", color: "white" }}>DOWN</span>}
                    {hasWip && !isDown && <span style={{ fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, background: "#d97706", color: "#1c1917" }}>RUN</span>}
                    {hasNotReady && <span style={{ fontSize: 9, fontWeight: 700, padding: "1px 4px", borderRadius: 3, background: "#dc2626", color: "white" }}>⚠</span>}
                  </div>
                </div>

                {/* NOW WO with remaining time + progress */}
                {nowRow && (
                  <div>
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 4 }}>
                      <span style={{ fontSize: 10, fontWeight: 600, color: "#f59e0b" }}>NOW</span>
                      <span style={{ fontFamily: "monospace", fontSize: 10, color: "rgba(255,255,255,0.7)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "60%" }}>{nowRow.wo}</span>
                      {remainHrs !== null && (
                        <span style={{ fontSize: 10, fontWeight: 700, color: remainHrs < 4 ? "#f87171" : "rgba(255,255,255,0.5)", whiteSpace: "nowrap" }}>
                          {remainHrs < 1 ? `${Math.round(remainHrs * 60)}m` : `${remainHrs.toFixed(1)}h`} left
                        </span>
                      )}
                    </div>
                    {nowRow.start_qty > 0 && (
                      <div style={{ height: 3, background: "rgba(255,255,255,0.1)", borderRadius: 2, marginTop: 2, overflow: "hidden" }}>
                        <div style={{ height: "100%", background: "#10b981", borderRadius: 2, width: `${Math.min(100,(nowRow.comp_qty||0)/nowRow.start_qty*100)}%` }} />
                      </div>
                    )}
                  </div>
                )}

                {/* NEXT WO */}
                {line.rows[1] && (
                  <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.3)" }}>NEXT</span>
                    <span style={{ fontFamily: "monospace", fontSize: 9, color: "rgba(255,255,255,0.45)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{line.rows[1].wo}</span>
                    {!isReady(line.rows[1]) && <span style={{ fontSize: 9, color: "#f87171" }}>⚠</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <PresentationRefresh />
      </div>
    );
  }


  return (
    <div className="min-h-screen bg-stone-50 text-slate-900" style={{ fontFamily: "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" }}>
      <header ref={headerRef} className="border-b border-stone-200 bg-white sticky top-0 z-40 shadow-sm">
        <div className="px-4 md:px-6 py-3 flex items-center gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-slate-900 text-white rounded-md flex items-center justify-center font-bold text-sm tracking-tight">B/P</div>
            <div>
              <div className="text-sm font-semibold text-slate-900">Build Plan Tracker</div>
              <div className="text-[11px] text-slate-500 flex items-center gap-1.5 flex-wrap">
                <span>{lines.length} {lines.length === 1 ? "line" : "lines"} · Bars by run hours</span>
                {fbStatus === "loading" && <span className="text-amber-600 font-medium">· ⏳ Connecting…</span>}
                {fbStatus === "live" && lastSync && <span className="text-emerald-600 font-medium">· 🔄 Live {lastSync.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>}
                {fbStatus === "error" && <span className="text-rose-600 font-medium">· ⚠ Offline</span>}
                {buildPlanRows && <span className="text-blue-600 font-medium">· 📋 Custom build plan</span>}
                {!buildPlanRows && <span className="text-slate-400 font-medium">· using baked-in build plan</span>}
              </div>
            </div>
            {/* Leader picker */}
            <div className="ml-2 relative group">
              <select
                value={selectedLeader}
                onChange={e => changeLeader(e.target.value)}
                className="appearance-none pl-3 pr-8 py-2 text-sm font-semibold bg-slate-900 text-white rounded-md border-2 border-slate-900 hover:bg-slate-800 cursor-pointer focus:outline-none focus:ring-2 focus:ring-slate-400"
              >
                {leaderList.map(l => (
                  <option key={l.name} value={l.name}>
                    {buName(l.name)} ({l.count})
                  </option>
                ))}
              </select>
              <svg className="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-white pointer-events-none" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.25 4.39a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z" clipRule="evenodd"/>
              </svg>
            </div>
            {/* Line filter */}
            <div className="relative">
              <select
                value={lineFilter}
                onChange={e => setLineFilter(e.target.value)}
                className="appearance-none pl-3 pr-8 py-2 text-sm font-semibold bg-white border border-stone-300 rounded-md hover:border-stone-400 cursor-pointer focus:outline-none"
              >
                <option value="all">All lines</option>
                <option value="running">Running only</option>
                <option value="running_down">Running + Down</option>
              </select>
              <svg className="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.25 4.39a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z" clipRule="evenodd"/>
              </svg>
            </div>

            {/* Upload buttons */}
            <div className="flex items-center gap-1.5 ml-2">
              <input ref={buildPlanInputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={handleBuildPlanUpload}/>
              <input ref={labourInputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={handleLabourUpload}/>
              <button
                onClick={() => buildPlanInputRef.current && buildPlanInputRef.current.click()}
                className="flex items-center gap-1 px-2.5 py-1.5 rounded-md border border-stone-300 hover:border-stone-400 bg-white text-slate-700 text-[11px] font-semibold"
                title="Upload new Build Plan Excel (Database Query sheet)"
              >
                📋 Build Plan
              </button>
              <button
                onClick={() => labourInputRef.current && labourInputRef.current.click()}
                className="flex items-center gap-1 px-2.5 py-1.5 rounded-md border border-stone-300 hover:border-stone-400 bg-white text-slate-700 text-[11px] font-semibold"
                title="Upload Labour Tickets — updates comp_qty on all matched WOs"
              >
                📂 Labour Tickets
              </button>
            </div>
            {/* Upload status toast */}
            {uploadStatus && (
              <div className={`text-[11px] px-2 py-1 rounded font-medium ${uploadStatus.ok === null ? "bg-blue-50 text-blue-700 border border-blue-200" : uploadStatus.ok ? "bg-emerald-50 text-emerald-700 border border-emerald-200" : "bg-rose-50 text-rose-700 border border-rose-200"}`}>
                {uploadStatus.msg}
              </div>
            )}

            {/* Presentation mode button */}
            <button
              onClick={() => setPresentationMode(true)}
              title="Presentation / TV Mode"
              className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md border border-stone-300 hover:border-slate-900 hover:bg-slate-900 hover:text-white bg-white text-slate-700 text-[11px] font-semibold transition-colors"
            >
              📺 TV Mode
            </button>

            {/* Initials badge — soft attribution */}
            {userInitials && (
              <button
                onClick={() => setShowInitialsModal(true)}
                title="Click to change initials"
                className="ml-1 flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-stone-100 hover:bg-stone-200 border border-stone-300 text-xs font-semibold text-slate-700"
              >
                <div className="w-5 h-5 rounded-full bg-slate-900 text-white flex items-center justify-center text-[10px] font-bold">{userInitials.slice(0, 2)}</div>
                <span className="hidden sm:inline">{userInitials}</span>
              </button>
            )}
          </div>
          <div className="flex items-center gap-5 ml-auto flex-wrap">
            <Stat label="Lines" value={stats.lines} />
            <Stat label="WIP" value={stats.wip} accent="amber" />
            {stats.nextNotReady > 0 && (
              <button
                onClick={() => setShowNextNotReady(v => !v)}
                className="text-left flex flex-col items-start hover:opacity-80 transition-opacity"
                title="Click to see which Next WOs are not ready"
              >
                <div className="flex items-center gap-1">
                  <AlertTriangle className="w-3 h-3 text-rose-600" fill="currentColor" />
                  <span className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Next Not Ready</span>
                </div>
                <span className="text-lg font-bold tabular-nums text-rose-700 leading-tight">{stats.nextNotReady} <span className="text-[10px] font-normal text-slate-400 ml-0.5">▾</span></span>
              </button>
            )}
            {stats.notReady > 0 && <StatWithIcon label="Not Ready" value={stats.notReady} accent="rose" icon={AlertTriangle} fill />}
            {stats.abr > 0 && <StatWithIcon label="Awaiting BR" value={stats.abr} accent="yellow" icon={Flag} fill />}
            {stats.brs > 0 && <StatWithIcon label="Submitted" value={stats.brs} accent="indigo" icon={FileCheck2} />}
            <Stat label="Production WOs" value={stats.activeWO} />

            <Stat label="Hrs Shown" value={fmtNum(stats.hrsShown)} />
          </div>
          <div className="flex items-center gap-2 text-xs text-slate-500 ml-auto md:ml-0">
            <span>Zoom</span>
            <input type="range" min="4" max="40" step="1" value={zoom} onChange={e => setZoom(Number(e.target.value))} className="w-24 accent-slate-700" />
          </div>
        </div>
      </header>

      {/* Closeout strips */}
      {abrList.length > 0 && (
        <ClosoutStrip
          stripRef={abrRef}
          stickyTop={stickyH.header}
          zIndex={39}
          title="Awaiting Batch Record"
          subtitle="Production complete · BR pending"
          rows={abrList}
          onSelect={setSelectedWo}
          tone="yellow"
          icon={<Flag className="w-4 h-4 fill-yellow-400 text-yellow-700" />}
        />
      )}
      {brsList.length > 0 && (
        <ClosoutStrip
          stripRef={brsRef}
          stickyTop={stickyH.header + stickyH.abr}
          zIndex={38}
          title="Batch Record Submitted"
          subtitle="Awaiting finalization"
          rows={brsList}
          onSelect={setSelectedWo}
          tone="indigo"
          icon={<FileCheck2 className="w-4 h-4 text-indigo-700" />}
        />
      )}

      <TimelineView
        lines={lines}
        queueLayout={queueLayout}
        zoom={zoom}
        onSelect={setSelectedWo}
        selectedKey={selectedKey}
        externalStickyTop={totalStickyTop}
        lineDown={lineDown}
        onMarkLineDown={setLineDownTarget}
      />

      <div className="sticky bottom-0 z-30 border-t border-slate-300 bg-slate-900 text-white px-4 py-2 flex items-center gap-3 text-xs flex-wrap">
        {overrideCount > 0 ? (
          <>
            <Pencil className="w-3.5 h-3.5" />
            <span><span className="font-bold tabular-nums">{overrideCount}</span> local update{overrideCount !== 1 ? "s" : ""}</span>
          </>
        ) : (
          <span className="text-slate-400">No local updates yet</span>
        )}
        <span className="ml-auto text-[10px] uppercase tracking-wider text-slate-400 font-semibold mr-1">Needed in 36h:</span>
        <button
          onClick={() => setMaterialsModal("tool")}
          className={`flex items-center gap-1.5 px-2.5 py-1 rounded font-semibold ${upcomingNotReady.tool.length > 0 ? "bg-amber-500 hover:bg-amber-600 text-slate-900" : "bg-slate-700 text-slate-400"}`}
        >
          <Wrench className="w-3 h-3" /> Tools <span className="tabular-nums">{upcomingNotReady.tool.length}</span>
        </button>
        <button
          onClick={() => setMaterialsModal("labels")}
          className={`flex items-center gap-1.5 px-2.5 py-1 rounded font-semibold ${upcomingNotReady.labels.length > 0 ? "bg-amber-500 hover:bg-amber-600 text-slate-900" : "bg-slate-700 text-slate-400"}`}
        >
          <Tag className="w-3 h-3" /> Labels <span className="tabular-nums">{upcomingNotReady.labels.length}</span>
        </button>
        <button
          onClick={() => setMaterialsModal("kit")}
          className={`flex items-center gap-1.5 px-2.5 py-1 rounded font-semibold ${upcomingNotReady.kit.length > 0 ? "bg-amber-500 hover:bg-amber-600 text-slate-900" : "bg-slate-700 text-slate-400"}`}
        >
          <Package className="w-3 h-3" /> Kits <span className="tabular-nums">{upcomingNotReady.kit.length}</span>
        </button>
        <button
          onClick={() => setShowShiftReport(true)}
          className="flex items-center gap-1.5 px-2.5 py-1 rounded bg-emerald-600 hover:bg-emerald-700 font-semibold"
        >
          <FileCheck2 className="w-3 h-3" /> Shift Report
        </button>
        {overrideCount > 0 && (
          <>
            <button onClick={exportOverrides} className="flex items-center gap-1.5 px-2.5 py-1 rounded bg-slate-700 hover:bg-slate-600"><Download className="w-3 h-3" /> Export CSV</button>
            <button onClick={resetAllOverrides} className="flex items-center gap-1.5 px-2.5 py-1 rounded bg-slate-700 hover:bg-rose-700"><RefreshCw className="w-3 h-3" /> Reset</button>
          </>
        )}
      </div>

      {materialsModal && (
        <MaterialsNeededModal
          kind={materialsModal}
          entries={upcomingNotReady[materialsModal]}
          selectedLeader={selectedLeader}
          onSelect={(r) => { setSelectedWo(r); setMaterialsModal(null); }}
          onClose={() => setMaterialsModal(null)}
        />
      )}

      {showInitialsModal && <InitialsModal current={userInitials} onSave={saveInitials} onCancel={userInitials ? () => setShowInitialsModal(false) : null} />}
      {showNextNotReady && (
        <NextNotReadyModal
          rows={stats.nextNotReadyList}
          onSelect={(r) => { setSelectedWo(r); setShowNextNotReady(false); }}
          onClose={() => setShowNextNotReady(false)}
        />
      )}
      {showShiftReport && (
        <ShiftReportModal
          allRows={allRows}
          selectedLeader={selectedLeader}
          lineDown={lineDown}
          onClose={() => setShowShiftReport(false)}
        />
      )}
      {lineDownTarget && (
        <LineDownModal
          resource={lineDownTarget}
          existing={(() => {
            const { shiftId, shiftDate } = getCurrentShift(new Date());
            return getLineDownEntry(lineDownTarget, shiftId, shiftDate);
          })()}
          onSave={(payload) => { markLineDown(lineDownTarget, payload); setLineDownTarget(null); }}
          onClear={(shiftId, shiftDate) => { unmarkLineDown(lineDownTarget, shiftId, shiftDate); setLineDownTarget(null); }}
          onCancel={() => setLineDownTarget(null)}
        />
      )}

      {selectedWo && <DetailPanel row={selectedWo} onClose={() => setSelectedWo(null)} updateRow={updateRow} setReadinessCheck={setReadinessCheck} logShiftEntry={logShiftEntry} />}
    </div>
  );
}

function ClosoutStrip({ title, subtitle, rows, onSelect, tone, icon, stripRef, stickyTop = 0, zIndex = 30 }) {
  const toneStyles = {
    yellow: { wrap: "border-yellow-300 bg-yellow-50", titleColor: "text-yellow-900", chipBorder: "border-yellow-300 hover:border-yellow-500" },
    indigo: { wrap: "border-indigo-300 bg-indigo-50", titleColor: "text-indigo-900", chipBorder: "border-indigo-300 hover:border-indigo-500" },
  }[tone];
  return (
    <div
      ref={stripRef}
      className={`border-b sticky shadow-sm ${toneStyles.wrap}`}
      style={{ top: `${stickyTop}px`, zIndex }}
    >
      <div className="px-4 md:px-6 py-2.5 flex items-center gap-3 flex-wrap">
        <div className={`flex items-center gap-2 font-semibold ${toneStyles.titleColor}`}>
          {icon}
          <span className="text-xs uppercase tracking-wider">{title}</span>
          <span className="text-xs tabular-nums">({rows.length})</span>
          <span className="text-[10px] text-slate-500 normal-case font-normal hidden md:inline">· {subtitle}</span>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {rows.map(r => {
            return (
              <button key={rowKey(r)} onClick={() => onSelect(r)}
                      className={`flex items-center gap-1.5 px-2.5 py-1 bg-white border rounded-md hover:shadow-sm transition-all text-xs ${toneStyles.chipBorder}`}>
                <span className="font-mono font-semibold text-slate-800">{r.wo}</span>
                <span className="text-slate-400">·</span>
                <span className="text-slate-700 truncate max-w-[120px]">{r.resource}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value, accent }) {
  const accentColor = { amber: "text-amber-700", emerald: "text-emerald-700", yellow: "text-yellow-800", indigo: "text-indigo-700", rose: "text-rose-700", slate: "text-slate-900" }[accent] || "text-slate-900";
  return (
    <div className="flex flex-col">
      <span className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">{label}</span>
      <span className={`text-lg font-bold tabular-nums leading-tight ${accentColor}`}>{value}</span>
    </div>
  );
}

function StatWithIcon({ label, value, accent, icon: Icon, fill }) {
  const accentColor = { amber: "text-amber-700", emerald: "text-emerald-700", yellow: "text-yellow-800", indigo: "text-indigo-700", rose: "text-rose-700", slate: "text-slate-900" }[accent] || "text-slate-900";
  const iconColor = { yellow: "text-yellow-700", indigo: "text-indigo-700", rose: "text-rose-600" }[accent] || "text-slate-700";
  const fillColor = fill ? (accent === "rose" ? "fill-rose-500" : "fill-yellow-400") : "";
  return (
    <div className="flex flex-col">
      <span className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center gap-1">
        {Icon && <Icon className={`w-3 h-3 ${iconColor} ${fillColor}`} />}
        {label}
      </span>
      <span className={`text-lg font-bold tabular-nums leading-tight ${accentColor}`}>{value}</span>
    </div>
  );
}

// Progress overlay — green fill showing comp_qty / start_qty
function ProgressOverlay({ row }) {
  if (!row.start_qty || row.start_qty <= 0 || !row.comp_qty || row.comp_qty <= 0) return null;
  const fillPct = Math.min(100, (row.comp_qty / row.start_qty) * 100);
  return (
    <div className="absolute inset-0 pointer-events-none">
      <div className="absolute inset-y-0 left-0 bg-emerald-500/85" style={{ width: `${fillPct}%` }} />
    </div>
  );
}

function TimelineView({ lines, queueLayout, zoom, onSelect, selectedKey, externalStickyTop = 0, lineDown = {}, onMarkLineDown }) {
  const maxHours = queueLayout.maxHours;
  const totalWidth = Math.max(400, maxHours * zoom + 40);
  const tickEvery = Math.max(1, Math.round(SHIFT_HOURS / 2));
  const ticks = useMemo(() => {
    const arr = [];
    for (let h = 0; h <= maxHours + tickEvery; h += tickEvery) arr.push(h);
    return arr;
  }, [maxHours, tickEvery]);
  const shiftLines = useMemo(() => {
    const arr = [];
    for (let h = SHIFT_HOURS; h <= maxHours + SHIFT_HOURS; h += SHIFT_HOURS) arr.push(h);
    return arr;
  }, [maxHours]);

  // Calendar projection — shared timeline using default 24h coverage (the visual baseline).
  // Per-line coverage (e.g. 16h lines) is captured in SHIFT_COVERAGE for use by future
  // features like the #8 escalating warning, but the visible calendar is shared.
  const now = useMemo(() => new Date(), []);
  const today = useMemo(() => { const d = new Date(now); d.setHours(0,0,0,0); return d; }, [now]);
  const calSegs = useMemo(() => calendarSegments(maxHours, now), [maxHours, now]);
  const offShiftsByLine = useMemo(() => {
    const map = new Map();
    for (const line of lines) {
      const cov = coverageFor(line.resource);
      map.set(line.resource, offShiftIntervals(maxHours, now, cov));
    }
    return map;
  }, [lines, maxHours, now]);

  // Use the offset passed in from the parent — accounts for header + visible closeout strips.
  const headerOffset = externalStickyTop;

  // Sync horizontal scroll between the sticky header row and the body scroll container
  const headerScrollRef = useRef(null);
  const bodyScrollRef = useRef(null);
  useEffect(() => {
    const header = headerScrollRef.current;
    const body = bodyScrollRef.current;
    if (!header || !body) return;
    let isSyncing = false;
    const onHeaderScroll = () => {
      if (isSyncing) return;
      isSyncing = true;
      body.scrollLeft = header.scrollLeft;
      isSyncing = false;
    };
    const onBodyScroll = () => {
      if (isSyncing) return;
      isSyncing = true;
      header.scrollLeft = body.scrollLeft;
      isSyncing = false;
    };
    header.addEventListener("scroll", onHeaderScroll);
    body.addEventListener("scroll", onBodyScroll);
    return () => {
      header.removeEventListener("scroll", onHeaderScroll);
      body.removeEventListener("scroll", onBodyScroll);
    };
  }, []);

  return (
    <div className="bg-white">
      {/* STICKY HEADER ROW: sidebar header (left) + calendar/axis (right) */}
      <div
        className="flex sticky bg-white z-30 border-b border-stone-200 shadow-sm"
        style={{ top: `${headerOffset}px` }}
      >
        <div className="w-48 md:w-60 shrink-0 border-r border-stone-200 bg-stone-50 h-[68px] px-3 md:px-4 flex flex-col justify-end pb-2">
          <span className="text-[10px] font-semibold tracking-wider uppercase text-slate-500">Resource / WO</span>
          <span className="text-[10px] text-slate-400">Production queue · hrs →</span>
          <span className="text-[9px] text-slate-400 italic mt-0.5">Mon-Fri · 24h baseline</span>
        </div>
        <div className="flex-1 overflow-x-auto overflow-y-hidden" ref={headerScrollRef}>
          <div style={{ width: `${totalWidth}px`, position: "relative" }} className="h-[68px]">
            {/* Calendar layer (top, ~24px) */}
            <div className="h-6 border-b border-stone-200 relative bg-stone-50/70">
              {calSegs.map((seg, i) => {
                const left = seg.startH * zoom;
                const width = (seg.endH - seg.startH) * zoom;
                const label = dayLabel(seg.date, today);
                const isToday = sameYMD(seg.date, today);
                const isWeekendDay = isWeekend(seg.date);
                return (
                  <div
                    key={`cal-${i}`}
                    className={`absolute top-0 bottom-0 flex items-center justify-center px-1 overflow-hidden border-r border-stone-300 ${isToday ? "bg-rose-50" : isWeekendDay ? "bg-stone-200/60" : ""}`}
                    style={{ left: `${left}px`, width: `${width}px` }}
                    title={`${label} · ${seg.date.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })}`}
                  >
                    {width > 38 ? (
                      <div className="flex items-baseline gap-1.5 truncate">
                        <span className={`text-[10px] font-bold tracking-wide ${isToday ? "text-rose-700" : "text-slate-700"}`}>{label}</span>
                        {width > 70 && <span className="text-[9px] tabular-nums text-slate-500">{dateLabel(seg.date)}</span>}
                      </div>
                    ) : width > 18 ? (
                      <span className={`text-[9px] font-semibold ${isToday ? "text-rose-700" : "text-slate-600"}`}>{label.slice(0, 3)}</span>
                    ) : null}
                  </div>
                );
              })}
            </div>
            {/* Hour axis layer (bottom, ~44px) */}
            <div className="h-[44px] relative">
              {shiftLines.map((h, i) => (
                <div key={`s-${i}`} className="absolute top-0 bottom-0 border-r border-dashed border-slate-300" style={{ left: `${h * zoom}px` }} />
              ))}
              {ticks.map((h, i) => {
                  const wallClock = projectDate(h, now, DEFAULT_COVERAGE);
                  const clockHr = wallClock.getHours();
                  const clockMin = wallClock.getMinutes();
                  const ampm = clockHr >= 12 ? "pm" : "am";
                  const hr12 = clockHr % 12 || 12;
                  const timeLabel = clockMin === 0
                    ? `${hr12}${ampm}`
                    : `${hr12}:${String(clockMin).padStart(2, "0")}${ampm}`;
                  return (
                <div key={`t-${i}`} className="absolute top-0 bottom-0 flex flex-col justify-end pb-1" style={{ left: `${h * zoom}px` }}>
                  <div className="border-l border-stone-300 h-2" />
                  <div className="text-[10px] tabular-nums text-slate-600 -translate-x-1/2 ml-px font-semibold">{h}h</div>
                  {h > 0 && (
                    <div className="text-[9px] text-slate-400 -translate-x-1/2 ml-px whitespace-nowrap">{timeLabel}</div>
                  )}
                </div>
                  );
                })}
            </div>
          </div>
        </div>
      </div>

      {/* BODY: sidebar list + scrolling timeline body */}
      <div className="flex">
        <div className="w-48 md:w-60 shrink-0 border-r border-stone-200 bg-stone-50/50">
          {lines.map(line => {
            const hasWip = line.rows.some(r => r.status === "wip");
            const cov = coverageFor(line.resource);
            const isLimitedCoverage = cov.endHour - cov.startHour < 24;
            // Check if line is marked down for current shift
            const { shiftId: nowShift, shiftDate: nowDate } = getCurrentShift(new Date());
            const downEntry = (() => {
              const entries = lineDown[line.resource] || [];
              const targetKey = shiftEntryKey(nowDate, nowShift);
              return entries.find(e => shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) === targetKey) || null;
            })();
            return (
              <div key={line.resource}>
                <div
                  className={`h-9 px-3 flex items-center gap-1.5 border-b border-stone-200 sticky z-20 ${
                    downEntry ? "bg-rose-100" : hasWip ? "bg-amber-100" : "bg-stone-100"
                  }`}
                  style={{ top: `${headerOffset + 68}px` }}
                >
                  <span className="text-xs md:text-sm font-semibold text-slate-900 truncate flex-1" title={line.resource}>{line.resource}</span>
                  {downEntry && (
                    <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-rose-600 text-white" title={`Down: ${downEntry.reason}${downEntry.notes ? " — " + downEntry.notes : ""} (by ${downEntry.by || "—"})`}>DOWN</span>
                  )}
                  {!downEntry && isLimitedCoverage && (
                    <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-sky-100 text-sky-700" title="2-shift line: 7am–11pm (16h/day)">16h</span>
                  )}
                  {!downEntry && hasWip && <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-amber-200 text-amber-900">RUN</span>}
                  <span className="text-[10px] text-slate-500 tabular-nums shrink-0">{fmtHrs(line.totalHrs)}</span>
                  <button
                    onClick={(e) => { e.stopPropagation(); onMarkLineDown && onMarkLineDown(line.resource); }}
                    className={`shrink-0 ml-0.5 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider transition-colors ${
                      downEntry
                        ? "bg-rose-700 text-white hover:bg-rose-800"
                        : "bg-white border border-stone-300 text-slate-600 hover:bg-rose-50 hover:border-rose-400 hover:text-rose-700"
                    }`}
                    title={downEntry ? "Edit/clear down status" : "Mark line down for current shift"}
                  >
                    {downEntry ? "Edit" : "Down"}
                  </button>
                </div>
                {line.rows.map((r, i) => {
                  const meta = STATUS[r.status] || STATUS.todo;
                  const showNotReady = r.status === "todo" && !isReady(r);
                  return (
                    <div key={rowKey(r)}
                         className={`h-7 px-3 pl-5 flex items-center gap-1.5 text-xs cursor-pointer hover:bg-stone-100 ${selectedKey === rowKey(r) ? "bg-stone-100" : ""} ${showNotReady ? "bg-rose-50/60" : ""}`}
                         onClick={() => onSelect(r)}>
                      <span className={`text-[9px] font-bold uppercase tracking-wider w-9 shrink-0 ${i === 0 ? "text-amber-700" : "text-slate-400"}`}>{POS_LABELS[i]}</span>
                      {showNotReady ? (
                        <AlertTriangle className="w-3 h-3 text-rose-600 shrink-0" fill="currentColor" />
                      ) : (
                        <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${meta.dot}`} />
                      )}
                      <span className="font-mono text-[10px] md:text-[11px] text-slate-700 truncate flex-1">{r.wo || "—"}</span>

                      {r._override && <Pencil className="w-2.5 h-2.5 text-slate-400 shrink-0" />}
                    </div>
                  );
                })}
                <div className="h-1 bg-stone-300" />
              </div>
            );
          })}
          {lines.length === 0 && (
            <div className="px-4 py-8 text-center text-xs text-slate-400 italic">No active production WOs for {buName(selectedLeader)}</div>
          )}
        </div>

        <div className="flex-1 overflow-x-auto" ref={bodyScrollRef}>
          <div style={{ width: `${totalWidth}px`, position: "relative" }}>

            <div className="absolute inset-0 top-0 pointer-events-none">
              {/* Day-boundary vertical lines through chart body */}
              {calSegs.slice(1).map((seg, i) => (
                <div key={`db-${i}`} className="absolute top-0 bottom-0 border-r border-stone-300" style={{ left: `${seg.startH * zoom}px` }} />
              ))}
              {shiftLines.map((h, i) => (
                <div key={`bs-${i}`} className="absolute top-0 bottom-0 border-r border-dashed border-stone-200" style={{ left: `${h * zoom}px` }} />
              ))}
            </div>

            {lines.map(line => {
              const layout = queueLayout.layout.get(line.resource);
              const hasWip = line.rows.some(r => r.status === "wip");
              const offShifts = offShiftsByLine.get(line.resource) || [];
              // Re-evaluate down state for body styling
              const { shiftId: nowShift2, shiftDate: nowDate2 } = getCurrentShift(new Date());
              const isDown = ((lineDown[line.resource] || []).find(e =>
                shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) === shiftEntryKey(nowDate2, nowShift2)
              )) ? true : false;
              const bgClass = isDown ? "bg-rose-100" : hasWip ? "bg-amber-100" : "bg-stone-100";
              return (
                <div key={line.resource} className={`relative ${bgClass}`}>
                  {/* Off-shift dark overlay — shows when this line is NOT producing
                      (e.g., midnight shift on 16h lines). Behind bars (z-0). */}
                  {offShifts.map((iv, i) => (
                    <div
                      key={`off-${line.resource}-${i}`}
                      className="absolute top-0 bottom-0 pointer-events-none z-0"
                      style={{
                        left: `${iv.startH * zoom}px`,
                        width: `${(iv.endH - iv.startH) * zoom}px`,
                        background: "repeating-linear-gradient(45deg, rgba(15,23,42,0.18) 0 4px, rgba(15,23,42,0.05) 4px 8px)",
                      }}
                    />
                  ))}
                  <div
                    className={`border-b border-stone-200 sticky z-20 ${bgClass}`}
                    style={{ top: `${headerOffset + 68}px`, height: "2.25rem", minHeight: "2.25rem" }}
                  >
                    <span className="sr-only">{line.resource}</span>
                  </div>
                  {layout?.items.map(it => {
                    const r = it.row;
                    const meta = STATUS[r.status] || STATUS.todo;
                    const x = it.start * zoom;
                    const w = Math.max(4, it.length * zoom);
                    const isSelected = selectedKey === rowKey(r);
                    const showNotReady = r.status === "todo" && !isReady(r);
                    return (
                      <div key={rowKey(r)} className="h-7 bg-white relative">
                        <div onClick={() => onSelect(r)}
                             className={`absolute top-1 h-5 rounded-sm cursor-pointer ${meta.bar} hover:brightness-110 transition-all overflow-hidden shadow-sm ${isSelected ? "ring-2 ring-slate-900 ring-offset-1" : ""} ${showNotReady ? "ring-2 ring-rose-500" : ""}`}
                             style={{ left: `${x}px`, width: `${w}px` }}
                             title={`${r.wo} · ${r.descr || r.part || ""} · ${fmtHrs(r.run_hrs)} · ${meta.label}${showNotReady ? " · NOT READY" : ""}`}>
                          <ProgressOverlay row={r} />
                          {w > 50 && (
                            <div className="absolute inset-0 flex items-center px-1.5 pointer-events-none gap-1.5 min-w-0">
                              {showNotReady && <AlertTriangle className="w-3 h-3 text-rose-700 shrink-0" fill="currentColor" />}
                              <span className={`text-[10px] font-mono font-semibold drop-shadow-sm shrink-0 ${meta.textOnBar}`}>{r.wo}</span>
                              {w > 130 && r.descr && (
                                <>
                                  <span className={`text-[10px] opacity-50 shrink-0 ${meta.textOnBar}`}>·</span>
                                  <span className={`text-[10px] font-medium truncate drop-shadow-sm ${meta.textOnBar}`}>{r.descr}</span>
                                </>
                              )}
                            </div>
                          )}
                          {w <= 50 && showNotReady && (
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                              <AlertTriangle className="w-3 h-3 text-rose-700" fill="currentColor" />
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                  <div className="h-1 bg-stone-300" />
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="px-4 md:px-6 py-3 border-t border-stone-200 bg-white flex items-center gap-3 md:gap-4 flex-wrap text-xs text-slate-600">
        <span className="font-semibold text-slate-500 uppercase tracking-wider text-[10px]">Legend</span>
        {["wip", "todo"].map(key => {
          const s = STATUS[key];
          return <span key={key} className="flex items-center gap-1.5"><span className={`w-3 h-3 rounded-sm ${s.bar}`} />{s.label}</span>;
        })}
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-emerald-500/85" />Progress</span>
        <span className="flex items-center gap-1.5"><Flag className="w-3 h-3 fill-yellow-400 text-yellow-700" />Awaiting BR (in strip above)</span>
        <span className="flex items-center gap-1.5"><FileCheck2 className="w-3 h-3 text-indigo-700" />BR Submitted (in strip above)</span>
        <span className="flex items-center gap-1.5"><span className="border-r border-dashed border-slate-400 h-3" />Shift (8h)</span>
      </div>
    </div>
  );
}

function MaterialsNeededModal({ kind, entries, selectedLeader, onSelect, onClose }) {
  const KIND_META = {
    tool: { label: "Tools", icon: Wrench, color: "amber", description: "WOs needing Tool verification (auto-covered WOs excluded)" },
    labels: { label: "Labels", icon: Tag, color: "amber", description: "WOs needing Label verification" },
    kit: { label: "Kits", icon: Package, color: "amber", description: "WOs needing Kit verification" },
  };
  const meta = KIND_META[kind];
  const I = meta.icon;

  // Group by resource
  const byResource = useMemo(() => {
    const map = new Map();
    for (const e of entries) {
      if (!map.has(e.row.resource)) map.set(e.row.resource, []);
      map.get(e.row.resource).push(e);
    }
    return [...map.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  }, [entries]);

  const formatStartsIn = (hrs) => {
    if (hrs < 1) return "now";
    if (hrs < 36) return `in ${Math.round(hrs)}h`;
    return "—";
  };
  const formatWallClock = (date) =>
    date.toLocaleString(undefined, { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });

  const printReport = () => window.print();

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/60 flex items-start justify-center p-4 pt-12 overflow-auto print:bg-white print:p-0">
      <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full flex flex-col max-h-[85vh] print:max-h-none print:shadow-none print:rounded-none">
        {/* Header */}
        <div className="px-5 py-4 border-b border-stone-200 flex items-center justify-between print:hidden">
          <div>
            <h2 className="text-lg font-bold text-slate-900 flex items-center gap-2">
              <I className="w-5 h-5 text-amber-600" />
              {meta.label} Needed in Next 36h
            </h2>
            <p className="text-xs text-slate-500">{meta.description} · {buName(selectedLeader)}</p>
          </div>
