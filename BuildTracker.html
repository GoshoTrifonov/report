          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded"><X className="w-5 h-5" /></button>
        </div>

        {/* Print-only header */}
        <div className="hidden print:block mb-4 pb-3 border-b-2 border-slate-900">
          <h1 className="text-xl font-bold">{meta.label} Needed in Next 36 Hours</h1>
          <p className="text-sm">BU: {buName(selectedLeader)} · Generated: {new Date().toLocaleString()}</p>
        </div>

        {/* Body */}
        <div className="flex-1 overflow-auto p-5 print:p-0">
          {entries.length === 0 ? (
            <div className="text-center py-8 text-sm text-slate-500 italic">
              ✓ All {meta.label.toLowerCase()} are ready for WOs starting in the next 36 hours.
            </div>
          ) : (
            <>
              <div className="mb-3 text-xs text-slate-600">
                <span className="font-bold tabular-nums text-slate-900">{entries.length}</span> WO{entries.length !== 1 ? "s" : ""} across <span className="font-bold tabular-nums text-slate-900">{byResource.length}</span> {byResource.length === 1 ? "line" : "lines"}
              </div>
              <div className="space-y-3">
                {byResource.map(([res, items]) => (
                  <div key={res} className="border border-stone-200 rounded-md overflow-hidden">
                    <div className="bg-stone-100 px-3 py-2 font-semibold text-sm text-slate-900 border-b border-stone-200 flex items-center justify-between">
                      <span>{res}</span>
                      <span className="text-[10px] font-normal text-slate-500">{items.length} WO{items.length !== 1 ? "s" : ""}</span>
                    </div>
                    <div className="divide-y divide-stone-100">
                      {items.map((e, i) => (
                        <button
                          key={i}
                          onClick={() => onSelect(e.row)}
                          className="w-full text-left px-3 py-2.5 hover:bg-amber-50 transition-colors print:hover:bg-transparent print:cursor-default"
                        >
                          <div className="flex items-baseline justify-between gap-2 mb-0.5">
                            <span className="font-mono font-bold text-slate-900 text-sm">{e.row.wo}</span>
                            <span className="text-[10px] font-semibold text-amber-700 tabular-nums shrink-0">
                              {formatStartsIn(e.startsInHrs)}
                            </span>
                          </div>
                          <div className="text-xs text-slate-700 mb-1">{e.row.descr || e.row.part || "—"}</div>
                          <div className="flex flex-wrap gap-2 items-center text-[10px] text-slate-500">
                            {kind === "tool" && WO_TOOL_MAP[e.row.wo] && (
                              <span className="font-mono font-semibold text-slate-700">Tool: {WO_TOOL_MAP[e.row.wo]}</span>
                            )}
                            {kind === "tool" && !WO_TOOL_MAP[e.row.wo] && (
                              <span className="italic">No tool ID on file</span>
                            )}
                            <span>Qty: <span className="font-mono">{fmtNum(e.row.start_qty)}</span></span>
                            <span className="text-stone-400">·</span>
                            <span>Starts ~{formatWallClock(e.startsAt)}</span>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>

        {/* Footer actions */}
        <div className="px-5 py-3 border-t border-stone-200 bg-stone-50 flex gap-2 print:hidden">
          <button onClick={onClose} className="px-3 py-2 rounded-md border border-stone-300 text-sm font-semibold text-slate-700 hover:bg-stone-100">Close</button>
          <button onClick={printReport} className="ml-auto px-4 py-2 rounded-md bg-slate-900 hover:bg-slate-800 text-white text-sm font-semibold">Print</button>
        </div>
      </div>
    </div>
  );
}

function NextNotReadyModal({ rows, onSelect, onClose }) {
  // Sort by run_hrs offset as proxy for urgency (earlier in queue = more urgent)
  // and attach a projected "starts in ~Xh" label based on position
  const sorted = useMemo(() => {
    return [...rows].sort((a, b) => (a._idx || 0) - (b._idx || 0));
  }, [rows]);

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/60 flex items-start justify-center p-4 pt-20" onClick={onClose}>
      <div className="bg-white rounded-lg shadow-xl max-w-lg w-full" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-stone-200 flex items-center justify-between">
          <div>
            <h2 className="text-lg font-bold text-slate-900 flex items-center gap-2">
              <AlertTriangle className="w-5 h-5 text-rose-600" fill="currentColor" />
              Next WOs Not Ready ({rows.length})
            </h2>
            <p className="text-xs text-slate-500">NEXT slot WOs missing readiness — sorted by urgency</p>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded"><X className="w-5 h-5" /></button>
        </div>
        <div className="max-h-[60vh] overflow-auto divide-y divide-stone-100">
          {sorted.length === 0 ? (
            <div className="px-5 py-8 text-center text-sm text-slate-500 italic">All NEXT WOs are ready 🎉</div>
          ) : sorted.map((r, i) => {
            const ready = r.readiness || {};
            const missing = [];
            if (!ready.tool?.ok) missing.push("Tool");
            if (!ready.labels?.ok) missing.push("Labels");
            if (!ready.kit?.ok) missing.push("Kit");
            // Estimate urgency from run_hrs of current NOW WO on this line
            const nowHrs = r._nowRunHrs || 0;
            const isUrgent = nowHrs > 0 && nowHrs < 4;
            return (
              <button
                key={i}
                onClick={() => onSelect(r)}
                className={`w-full text-left px-4 py-3 transition-colors ${isUrgent ? "bg-rose-50 border-l-4 border-rose-500 hover:bg-rose-100" : "hover:bg-stone-50"}`}
              >
                <div className="flex items-center justify-between gap-3">
                  <div className="min-w-0 flex-1">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-xs font-semibold text-slate-500">{r.resource}</span>
                      {isUrgent && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-rose-600 text-white">URGENT</span>}
                      {nowHrs > 0 && <span className={`text-[10px] font-semibold ${isUrgent ? "text-rose-700" : "text-slate-500"}`}>⏱ NOW WO ~{nowHrs.toFixed(0)}h left</span>}
                    </div>
                    <div className="font-mono text-sm font-bold text-slate-900">{r.wo}</div>
                    <div className="text-xs text-slate-600 truncate">{r.descr || r.part}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="text-[10px] uppercase tracking-wider text-rose-700 font-bold mb-1">Missing:</div>
                    <div className="flex flex-wrap gap-1 justify-end">
                      {missing.map(m => (
                        <span key={m} className="text-[10px] font-semibold px-1.5 py-0.5 rounded bg-rose-100 text-rose-800 border border-rose-200">{m}</span>
                      ))}
                    </div>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
        <div className="px-5 py-3 border-t border-stone-200 bg-stone-50 text-[10px] text-slate-500 italic">
          Click a WO to open it and verify readiness · Red border = NOW WO finishing in under 4h
        </div>
      </div>
    </div>
  );
}

function LineDownModal({ resource, existing, onSave, onClear, onCancel }) {
  const { shiftId: defaultShift, shiftDate: defaultDate } = useMemo(() => getCurrentShift(new Date()), []);
  const [shiftId, setShiftId] = useState(existing?.shiftId || defaultShift);
  const [reason, setReason] = useState(existing?.reason || "");
  const [notes, setNotes] = useState(existing?.notes || "");
  const REASONS = ["Quality", "Tooling", "Machinery", "No Manpower", "Not Scheduled", "Other"];

  const submit = () => {
    if (!reason) {
      alert("Pick a reason before saving.");
      return;
    }
    onSave({ shiftId, shiftDate: defaultDate, reason, notes });
  };

  const meta = SHIFTS.find(s => s.id === shiftId);
  const dateLabel = defaultDate.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-4">
      <div className="bg-white rounded-lg shadow-xl max-w-md w-full">
        <div className="px-5 py-4 border-b border-stone-200 flex items-center justify-between">
          <div>
            <h2 className="text-lg font-bold text-slate-900">Mark Line Down</h2>
            <p className="text-xs text-slate-500">{resource}</p>
          </div>
          <button onClick={onCancel} className="p-1.5 hover:bg-stone-100 rounded"><X className="w-5 h-5" /></button>
        </div>

        <div className="p-5 space-y-4">
          {/* Shift selector */}
          <div>
            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-600 block mb-1.5">Shift</label>
            <div className="grid grid-cols-3 gap-1.5">
              {SHIFTS.map(s => (
                <button
                  key={s.id}
                  onClick={() => setShiftId(s.id)}
                  className={`px-2 py-2 rounded-md border-2 text-left ${shiftId === s.id ? "bg-rose-600 border-rose-700 text-white" : "bg-white border-stone-200 hover:border-rose-400"}`}
                >
                  <div className="text-[11px] font-bold">{s.label}</div>
                  <div className={`text-[9px] ${shiftId === s.id ? "text-rose-100" : "text-slate-500"}`}>{s.time}</div>
                </button>
              ))}
            </div>
            <div className="text-[10px] text-slate-500 mt-1.5 italic">
              Marking down: <span className="font-semibold text-slate-700">{dateLabel} · {meta.label}</span>
            </div>
          </div>

          {/* Reason */}
          <div>
            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-600 block mb-1.5">Reason <span className="text-rose-600">*</span></label>
            <div className="grid grid-cols-2 gap-1.5">
              {REASONS.map(r => (
                <button
                  key={r}
                  onClick={() => setReason(r)}
                  className={`px-2 py-2 rounded-md border-2 text-sm font-semibold ${
                    reason === r
                      ? "bg-rose-600 border-rose-700 text-white"
                      : "bg-white border-stone-200 text-slate-700 hover:border-rose-400"
                  }`}
                >
                  {r}
                </button>
              ))}
            </div>
          </div>

          {/* Notes */}
          <div>
            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-600 block mb-1.5">
              Notes <span className="text-slate-400 font-normal normal-case tracking-normal">(optional)</span>
            </label>
            <textarea
              value={notes}
              onChange={e => setNotes(e.target.value)}
              rows={2}
              placeholder="Specifics about the down time..."
              className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md focus:outline-none focus:border-rose-500 bg-white resize-none"
            />
          </div>
        </div>

        <div className="px-5 py-3 border-t border-stone-200 bg-stone-50 flex gap-2">
          <button onClick={onCancel} className="px-3 py-2 rounded-md border border-stone-300 text-sm font-semibold text-slate-700 hover:bg-stone-100">Cancel</button>
          {existing && (
            <button
              onClick={() => onClear(existing.shiftId, new Date(existing.shiftDateISO))}
              className="px-3 py-2 rounded-md border border-stone-300 text-sm font-semibold text-slate-700 hover:bg-rose-50 hover:border-rose-300"
            >
              Clear down status
            </button>
          )}
          <button
            onClick={submit}
            disabled={!reason}
            className="ml-auto px-4 py-2 rounded-md bg-rose-600 hover:bg-rose-700 disabled:bg-stone-300 disabled:text-slate-500 text-white text-sm font-semibold"
          >
            {existing ? "Update" : "Mark Down"}
          </button>
        </div>
      </div>
    </div>
  );
}

function InitialsModal({ current, onSave, onCancel }) {
  const [val, setVal] = useState(current || "");
  const submit = () => {
    const clean = val.trim().toUpperCase();
    if (clean.length >= 2) onSave(clean);
  };
  return (
    <div className="fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-4">
      <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6">
        <h2 className="text-lg font-bold text-slate-900 mb-1">Welcome — who are you?</h2>
        <p className="text-sm text-slate-600 mb-4">Enter your initials so we can track who logged what during the shift.</p>
        <input
          type="text"
          value={val}
          onChange={e => setVal(e.target.value.toUpperCase().slice(0, 4))}
          onKeyDown={e => { if (e.key === "Enter") submit(); }}
          autoFocus
          placeholder="e.g. AB or JTS"
          maxLength={4}
          className="w-full px-3 py-3 text-2xl font-mono font-bold tracking-widest text-center border-2 border-stone-300 rounded-md focus:outline-none focus:border-slate-900 uppercase"
        />
        <p className="text-xs text-slate-500 mt-2 italic">2-4 characters. You can change this later by tapping your initials in the header.</p>
        <div className="flex gap-2 mt-5">
          {onCancel && (
            <button onClick={onCancel} className="flex-1 px-3 py-2 rounded-md border border-stone-300 text-sm font-semibold text-slate-700 hover:bg-stone-50">Cancel</button>
          )}
          <button
            onClick={submit}
            disabled={val.trim().length < 2}
            className="flex-1 px-3 py-2 rounded-md bg-slate-900 hover:bg-slate-800 disabled:bg-stone-300 disabled:text-slate-500 text-white text-sm font-semibold"
          >
            Continue
          </button>
        </div>
      </div>
    </div>
  );
}

function ShiftReportModal({ allRows, selectedLeader, lineDown = {}, onClose }) {
  // Default to "current" shift but let user pick which shift to report on
  const { shiftId: nowShiftId, shiftDate: nowShiftDate } = useMemo(() => getCurrentShift(new Date()), []);
  const [reportShiftId, setReportShiftId] = useState(nowShiftId);
  const [reportDate, setReportDate] = useState(nowShiftDate);

  // Find all WOs for the selected leader that had shift entries OR were active on the report shift.
  const reportData = useMemo(() => {
    const targetKey = shiftEntryKey(reportDate, reportShiftId);
    const woEntries = []; // {row, entry}
    const woStatus = []; // WOs that are currently WIP/abr/brs (status during this shift)
    // Find resources for this leader
    const leaderResources = new Set();
    for (const r of allRows) {
      if (r.leader === selectedLeader) leaderResources.add(r.resource);
    }
    for (const r of allRows) {
      if (r.leader !== selectedLeader) continue;
      const matchingEntries = (r.shifts || []).filter(s =>
        shiftEntryKey(new Date(s.shiftDateISO), s.shiftId) === targetKey
      );
      if (matchingEntries.length > 0) {
        for (const e of matchingEntries) {
          woEntries.push({ row: r, entry: e });
        }
      }
      // Capture WOs currently in production state (no entry but status changed)
      if (matchingEntries.length === 0 && (r.status === "wip" || r.status === "abr" || r.status === "brs")) {
        woStatus.push(r);
      }
    }
    // Find lines marked down for this shift (only for this leader's resources)
    const downLines = [];
    for (const [res, entries] of Object.entries(lineDown)) {
      if (!leaderResources.has(res)) continue;
      const match = entries.find(e => shiftEntryKey(new Date(e.shiftDateISO), e.shiftId) === targetKey);
      if (match) downLines.push({ resource: res, ...match });
    }
    // Group by resource for the report
    const byResource = new Map();
    for (const item of woEntries) {
      const key = item.row.resource;
      if (!byResource.has(key)) byResource.set(key, { entries: [], statusOnly: [] });
      byResource.get(key).entries.push(item);
    }
    for (const r of woStatus) {
      const key = r.resource;
      if (!byResource.has(key)) byResource.set(key, { entries: [], statusOnly: [] });
      byResource.get(key).statusOnly.push(r);
    }
    // Aggregate stats
    const totalUnits = woEntries.reduce((s, x) => s + (x.entry.qty || 0), 0);
    const totalEntries = woEntries.length;
    const reasonsCount = {};
    for (const x of woEntries) {
      if (x.entry.reason) {
        reasonsCount[x.entry.reason] = (reasonsCount[x.entry.reason] || 0) + 1;
      }
    }
    for (const d of downLines) {
      if (d.reason) reasonsCount[d.reason] = (reasonsCount[d.reason] || 0) + 1;
    }
    return { byResource, totalUnits, totalEntries, reasonsCount, downLines };
  }, [allRows, selectedLeader, reportShiftId, reportDate, lineDown]);

  const meta = SHIFTS.find(s => s.id === reportShiftId);
  const dateLabel = reportDate.toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric", year: "numeric" });

  const printReport = () => {
    window.print();
  };
  const copyReport = () => {
    const lines = [];
    lines.push(`SHIFT REPORT — ${buName(selectedLeader)}`);
    lines.push(`${dateLabel} · ${meta.label} (${meta.time})`);
    lines.push("=".repeat(60));
    lines.push("");
    lines.push(`Total units this shift: ${reportData.totalUnits}`);
    lines.push(`Entries logged: ${reportData.totalEntries}`);
    lines.push("");
    if (reportData.byResource.size === 0) {
      lines.push("(No shift entries logged for this shift.)");
    } else {
      for (const [res, data] of reportData.byResource.entries()) {
        lines.push(`--- ${res} ---`);
        for (const { row, entry } of data.entries) {
          const ratio = row.start_qty > 0 ? `${row.comp_qty}/${row.start_qty}` : "";
          lines.push(`  ${row.wo} · ${row.descr || row.part || ""}`);
          lines.push(`    +${entry.qty} units this shift · total ${ratio} · by ${entry.by || "—"}`);
          if (entry.reason) lines.push(`    Reason: ${entry.reason}`);
          if (entry.notes) lines.push(`    Notes: ${entry.notes}`);
        }
        for (const r of data.statusOnly) {
          lines.push(`  ${r.wo} · ${r.descr || r.part || ""} · ${r.status.toUpperCase()} (no entries this shift)`);
        }
        lines.push("");
      }
    }
    if (reportData.downLines.length > 0) {
      lines.push("LINES DOWN THIS SHIFT:");
      for (const d of reportData.downLines) {
        lines.push(`  ${d.resource} — ${d.reason}${d.notes ? " · " + d.notes : ""} (by ${d.by || "—"})`);
      }
      lines.push("");
    }
    if (Object.keys(reportData.reasonsCount).length > 0) {
      lines.push("Reasons (entries + down lines):");
      for (const [reason, count] of Object.entries(reportData.reasonsCount)) {
        lines.push(`  ${reason}: ${count}`);
      }
    }
    navigator.clipboard.writeText(lines.join("\n")).then(() => {
      alert("Report copied to clipboard. Paste into email or document.");
    }).catch(() => alert("Copy failed — try again or print instead."));
  };

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-4 overflow-auto">
      <div className="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[90vh] flex flex-col">
        {/* Header */}
        <div className="px-6 py-4 border-b border-stone-200 flex items-center justify-between print:hidden">
          <div>
            <h2 className="text-lg font-bold text-slate-900">Shift Report</h2>
            <p className="text-xs text-slate-500">Roll-up of production for the selected shift</p>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded"><X className="w-5 h-5" /></button>
        </div>

        {/* Shift selector */}
        <div className="px-6 py-3 border-b border-stone-200 bg-stone-50 print:hidden">
          <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Report for shift:</div>
          <div className="grid grid-cols-3 gap-1.5">
            {SHIFTS.map(s => (
              <button
                key={s.id}
                onClick={() => setReportShiftId(s.id)}
                className={`px-2 py-1.5 rounded-md border-2 text-left ${reportShiftId === s.id ? "bg-emerald-600 border-emerald-700 text-white" : "bg-white border-stone-200 hover:border-emerald-400"}`}
              >
                <div className="text-[11px] font-bold">{s.label}</div>
                <div className={`text-[9px] ${reportShiftId === s.id ? "text-emerald-100" : "text-slate-500"}`}>{s.time}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Report content */}
        <div className="flex-1 overflow-auto p-6 print:p-0">
          {/* Print-only header */}
          <div className="hidden print:block mb-4 pb-3 border-b-2 border-slate-900">
            <h1 className="text-xl font-bold">Shift Report — {buName(selectedLeader)}</h1>
            <p className="text-sm">{dateLabel} · {meta.label} ({meta.time})</p>
          </div>

          {/* Summary */}
          <div className="grid grid-cols-4 gap-2 mb-4">
            <ReportStat label="Total units" value={reportData.totalUnits.toLocaleString()} />
            <ReportStat label="Entries" value={reportData.totalEntries} />
            <ReportStat label="Resources active" value={reportData.byResource.size} />
            <ReportStat label="Lines down" value={reportData.downLines.length} />
          </div>

          {reportData.byResource.size === 0 && reportData.downLines.length === 0 ? (
            <div className="text-center py-8 text-sm text-slate-500 italic">
              No shift entries or down-line markers logged for {meta.label} on {dateLabel}.
              <br />
              <span className="text-xs">Once supervisors log production or mark lines down for this shift, it'll show up here.</span>
            </div>
          ) : (
            <div className="space-y-4">
              {reportData.downLines.length > 0 && (
                <div className="border-2 border-rose-300 bg-rose-50 rounded-md overflow-hidden">
                  <div className="bg-rose-600 text-white px-3 py-2 font-semibold text-sm">⚠ Lines down this shift ({reportData.downLines.length})</div>
                  <div className="divide-y divide-rose-200">
                    {reportData.downLines.map((d, i) => (
                      <div key={i} className="px-3 py-2 text-sm">
                        <div className="flex items-baseline justify-between gap-2">
                          <span className="font-semibold text-slate-900">{d.resource}</span>
                          <span className="text-[11px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-rose-200 text-rose-900">{d.reason || "—"}</span>
                        </div>
                        {d.notes && <div className="text-[12px] text-slate-700 mt-1 leading-snug">{d.notes}</div>}
                        <div className="text-[10px] text-slate-500 mt-1">by {d.by || "—"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {[...reportData.byResource.entries()].map(([res, data]) => (
                <div key={res} className="border border-stone-200 rounded-md overflow-hidden">
                  <div className="bg-stone-100 px-3 py-2 font-semibold text-sm text-slate-900 border-b border-stone-200">{res}</div>
                  <div className="divide-y divide-stone-100">
                    {data.entries.map((item, i) => (
                      <div key={i} className="px-3 py-2.5 text-sm">
                        <div className="flex items-baseline justify-between gap-2">
                          <div>
                            <span className="font-mono font-semibold text-slate-900">{item.row.wo}</span>
                            <span className="text-slate-600 ml-2">{item.row.descr || item.row.part}</span>
                          </div>
                          <div className="text-right shrink-0">
                            <div className="font-bold text-emerald-700 tabular-nums">+{fmtNum(item.entry.qty)}</div>
                            <div className="text-[10px] text-slate-500 tabular-nums">{fmtNum(item.row.comp_qty)} / {fmtNum(item.row.start_qty)} total</div>
                          </div>
                        </div>
                        <div className="text-[11px] text-slate-500 mt-1">by {item.entry.by || "—"}</div>
                        {item.entry.reason && (
                          <div className="mt-1.5 inline-block text-[11px] font-semibold px-2 py-0.5 rounded bg-amber-100 text-amber-900">⚠ {item.entry.reason}</div>
                        )}
                        {item.entry.notes && (
                          <div className="mt-1.5 text-[12px] text-slate-700 leading-snug bg-stone-50 border-l-2 border-stone-300 pl-2 py-1">{item.entry.notes}</div>
                        )}
                      </div>
                    ))}
                    {data.statusOnly.map((r, i) => (
                      <div key={`s-${i}`} className="px-3 py-2 text-sm bg-stone-50">
                        <span className="font-mono text-slate-700">{r.wo}</span>
                        <span className="text-slate-500 ml-2 text-xs">{r.descr || r.part}</span>
                        <span className="ml-2 text-[10px] uppercase font-bold text-slate-400">{r.status} (no entries)</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {Object.keys(reportData.reasonsCount).length > 0 && (
            <div className="mt-5 pt-4 border-t border-stone-200">
              <div className="text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Underperformance reasons</div>
              <div className="flex flex-wrap gap-2">
                {Object.entries(reportData.reasonsCount).map(([reason, count]) => (
                  <div key={reason} className="px-2.5 py-1 rounded-md bg-amber-50 border border-amber-200 text-xs">
                    <span className="font-semibold text-amber-900">{reason}</span>
                    <span className="text-amber-700 ml-1.5">({count})</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Actions */}
        <div className="px-6 py-3 border-t border-stone-200 bg-stone-50 flex gap-2 print:hidden">
          <button onClick={copyReport} className="flex-1 px-3 py-2 rounded-md bg-slate-900 hover:bg-slate-800 text-white text-sm font-semibold">Copy as text</button>
          <button onClick={printReport} className="flex-1 px-3 py-2 rounded-md bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold">Print</button>
        </div>
      </div>
    </div>
  );
}

function ShiftEntryPanel({ row, logShiftEntry }) {
  const { shiftId: defaultShift, shiftDate: defaultDate } = useMemo(() => getCurrentShift(new Date()), []);
  const [shiftId, setShiftId] = useState(defaultShift);
  const [qty, setQty] = useState("");
  const [notes, setNotes] = useState("");
  const [reason, setReason] = useState("");
  const [showHistory, setShowHistory] = useState(false);

  const remaining = Math.max(0, (row.start_qty || 0) - (row.comp_qty || 0));
  const history = (row.shifts || []).slice().sort((a, b) =>
    (b.shiftDateISO + b.shiftId).localeCompare(a.shiftDateISO + a.shiftId)
  );

  // Expected shift output = (start_qty / run_hrs) × 8h, with 5% tolerance
  const ratePerHour = row.run_hrs > 0 ? (row.start_qty || 0) / row.run_hrs : 0;
  const expectedShift = Math.round(ratePerHour * 8);
  const tolerance = 0.95;
  const enteredQty = Number(qty) || 0;
  const isOver  = expectedShift > 0 && enteredQty > 0 && enteredQty > expectedShift * 1.15;
  const isShort = expectedShift > 0 && enteredQty > 0 && enteredQty < expectedShift * tolerance;
  const REASONS = ["Quality", "Tooling", "Machinery", "Materials", "Other"];

  const submit = () => {
    const n = Number(qty);
    if (!Number.isFinite(n) || n <= 0) {
      alert("Enter a quantity greater than 0.");
      return;
    }
    if (n > remaining + 0.5) {
      if (!confirm(`Logging ${n} but only ${remaining} units remain. Continue?`)) return;
    }
    if ((isShort || isOver) && !reason) {
      alert(`Quantity is ${isOver ? "above 115%" : "below 95%"} of expected (${expectedShift}). Please pick a reason.`);
      return;
    }
    logShiftEntry(row, { shiftId, shiftDate: defaultDate, qty: n, notes, reason: (isShort || isOver) ? reason : "" });
    setQty("");
    setNotes("");
    setReason("");
  };

  const meta = SHIFTS.find(s => s.id === shiftId);
  const dateLabel = defaultDate.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });

  return (
    <div className="rounded-md border-2 border-sky-300 bg-sky-50 p-3">
      <div className="flex items-center justify-between mb-2.5">
        <div className="flex items-center gap-2">
          <FileCheck2 className="w-4 h-4 text-sky-700" />
          <span className="text-xs font-bold uppercase tracking-wider text-sky-700">Log Shift Production</span>
        </div>
        {history.length > 0 && (
          <button
            onClick={() => setShowHistory(v => !v)}
            className="text-[10px] font-semibold text-sky-700 hover:text-sky-900 underline"
          >
            {showHistory ? "Hide" : "Show"} history ({history.length})
          </button>
        )}
      </div>

      {/* Shift selector */}
      <div className="grid grid-cols-3 gap-1.5 mb-2.5">
        {SHIFTS.map(s => {
          const isActive = s.id === shiftId;
          const isDefault = s.id === defaultShift;
          return (
            <button
              key={s.id}
              onClick={() => setShiftId(s.id)}
              className={`px-1 py-2 rounded-md border-2 transition-all text-left ${
                isActive
                  ? "bg-sky-600 border-sky-700 text-white shadow-sm"
                  : "bg-white border-sky-200 text-slate-700 hover:border-sky-400"
              }`}
            >
              <div className="text-[11px] font-bold leading-tight flex items-center gap-1">
                {s.label}
                {isDefault && <span className={`text-[8px] uppercase px-1 rounded ${isActive ? "bg-white/20" : "bg-sky-100 text-sky-700"}`}>Now</span>}
              </div>
              <div className={`text-[9px] leading-tight ${isActive ? "text-sky-100" : "text-slate-500"}`}>{s.time}</div>
            </button>
          );
        })}
      </div>
      <div className="text-[10px] text-slate-600 mb-2 italic">
        Logging for: <span className="font-semibold text-slate-800">{dateLabel} · {meta.label}</span>
      </div>

      {/* Qty input */}
      <div className="mb-2">
        <label className="text-[10px] font-semibold uppercase tracking-wider text-slate-600 block mb-1">
          Units this shift
          <span className="text-slate-400 font-normal normal-case tracking-normal ml-1">
            (adds to total · {remaining} remaining{expectedShift > 0 ? ` · target ~${expectedShift}/shift` : ""})
          </span>
        </label>
        <input
          type="number"
          inputMode="numeric"
          value={qty}
          onChange={e => setQty(e.target.value)}
          placeholder="0"
          className={`w-full px-3 py-2 text-base font-mono border rounded-md focus:outline-none bg-white ${isShort ? "border-amber-400 focus:border-amber-500" : "border-stone-300 focus:border-sky-500"}`}
        />
      </div>

      {/* Reason dropdown — shown only when entered qty is below 95% of target */}
      {(isShort || isOver) && (
        <div className="mb-2.5 p-2.5 rounded-md bg-amber-50 border-2 border-amber-300">
          <label className="text-[10px] font-bold uppercase tracking-wider text-amber-900 block mb-1.5">
            {isOver ? "⬆ Above target — pick a reason" : "⚠ Below target — pick a reason"} <span className="text-amber-700">({enteredQty} vs ~{expectedShift} expected)</span>
          </label>
          <div className="grid grid-cols-2 gap-1.5">
            {REASONS.map(r => (
              <button
                key={r}
                onClick={() => setReason(r)}
                className={`px-2 py-1.5 rounded-md border-2 text-xs font-semibold transition-all ${
                  reason === r
                    ? "bg-amber-600 border-amber-700 text-white"
                    : "bg-white border-amber-300 text-amber-900 hover:border-amber-500"
                }`}
              >
                {r}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Notes */}
      <div className="mb-2.5">
        <label className="text-[10px] font-semibold uppercase tracking-wider text-slate-600 block mb-1">
          Issues / notes
          <span className="text-slate-400 font-normal normal-case tracking-normal ml-1">(optional)</span>
        </label>
        <textarea
          value={notes}
          onChange={e => setNotes(e.target.value)}
          rows={2}
          placeholder="Downtime, material issues, anything else..."
          className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md focus:outline-none focus:border-sky-500 bg-white resize-none"
        />
      </div>

      <button
        onClick={submit}
        disabled={!qty || Number(qty) <= 0}
        className="w-full px-3 py-2.5 bg-sky-600 hover:bg-sky-700 disabled:bg-stone-300 disabled:text-slate-500 text-white rounded-md text-sm font-semibold transition-colors"
      >
        Log shift entry
      </button>

      {/* History */}
      {showHistory && history.length > 0 && (
        <div className="mt-3 pt-3 border-t border-sky-200 space-y-1.5">
          <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-600">Shift history</div>
          {history.map((entry, i) => (
            <div key={i} className="bg-white border border-stone-200 rounded p-2">
              <div className="flex items-baseline justify-between gap-2">
                <div className="text-[11px] font-semibold text-slate-800">{shiftLabel(entry)}</div>
                <div className="text-xs tabular-nums font-mono font-bold text-sky-700">+{fmtNum(entry.qty)}</div>
              </div>
              {entry.reason && (
                <div className="mt-1 inline-block text-[10px] font-semibold px-1.5 py-0.5 rounded bg-amber-100 text-amber-900">⚠ {entry.reason}</div>
              )}
              {entry.notes && <div className="text-[11px] text-slate-600 mt-1 leading-snug">{entry.notes}</div>}
              <div className="text-[9px] text-slate-400 mt-1">
                {entry.by && <span className="font-semibold text-slate-500">by {entry.by} · </span>}
                Logged {new Date(entry.loggedAt).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

              </span>
              {cutShort && <span className="text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded bg-orange-100 text-orange-800 border border-orange-300 flex items-center gap-1"><Scissors className="w-2.5 h-2.5" />Cut Short</span>}
              {row._override && <span className="text-[10px] font-medium px-2 py-0.5 rounded bg-slate-100 text-slate-700 border border-slate-300 inline-flex items-center gap-1"><Pencil className="w-2.5 h-2.5" />Edited</span>}
            </div>
            <div className="font-mono text-base font-bold text-slate-900 mt-1">{row.wo}</div>
            <div className="text-xs text-slate-500">{row.resource}</div>
          </div>
          <button onClick={onClose} className="p-1 -mr-1 text-slate-400 hover:text-slate-700 rounded-md hover:bg-stone-100"><X className="w-5 h-5" /></button>
        </div>

        <div className="p-5 space-y-5">
          {/* Primary closeout actions */}
          {row.status === "abr" && (
            <div className="space-y-2">
              <button
                onClick={submitBatchRecord}
                className="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-semibold text-sm flex items-center justify-center gap-2 shadow-sm transition-colors"
              >
                <FileCheck2 className="w-4 h-4" />
                Submit Batch Record
              </button>
              <div className="text-[10px] text-slate-500 text-center italic">Production team marks BR as ready for review</div>
            </div>
          )}

          {row.status === "brs" && (
            <div className="space-y-2">
              <button
                onClick={finalizeWo}
                className="w-full px-4 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-md font-semibold text-sm flex items-center justify-center gap-2 shadow-sm transition-colors"
              >
                <CheckCircle2 className="w-4 h-4" />
                Finalize WO · Archive
              </button>
              <div className="text-[10px] text-slate-500 text-center italic">After BR review — WO disappears from queue</div>
            </div>
          )}

          <div>
            <div className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-1">Part</div>
            <div className="text-sm text-slate-900">{row.descr || "—"}</div>
            <div className="text-xs text-slate-500 mt-0.5 font-mono">{row.part || "—"}</div>
          </div>

          {/* Readiness checklist — shown only for queued WOs */}
          {showReadiness && (
            <div className={`rounded-md border-2 p-3 ${ready ? "bg-emerald-50 border-emerald-300" : "bg-rose-50 border-rose-300"}`}>
              <div className="flex items-center justify-between mb-2.5">
                <div className="flex items-center gap-2">
                  {ready ? (
                    <>
                      <CheckCircle2 className="w-4 h-4 text-emerald-600" />
                      <span className="text-xs font-bold uppercase tracking-wider text-emerald-700">Ready to Start</span>
                    </>
                  ) : (
                    <>
                      <AlertTriangle className="w-4 h-4 text-rose-600" fill="currentColor" />
                      <span className="text-xs font-bold uppercase tracking-wider text-rose-700">Not Ready</span>
                    </>
                  )}
                </div>
                <span className={`text-[11px] tabular-nums font-semibold ${ready ? "text-emerald-700" : "text-rose-700"}`}>
                  {rdyCount} / {READINESS_KEYS.length}
                </span>
              </div>
              <div className="grid grid-cols-3 gap-2">
                {READINESS_KEYS.map(k => {
                  const item = (row.readiness || {})[k];
                  const ok = item?.ok === true;
                  const isAuto = ok && item?.auto === true;
                  const isNA = ok && item?.na === true;
                  const I = READINESS_ICONS[k];
                  const toolId = k === "tool" ? WO_TOOL_MAP[row.wo] : null;
                  return (
                    <button
                      key={k}
                      onClick={() => setReadinessCheck(row, k, !ok)}
                      title={isNA ? "No tool required for this WO — auto-checked." : isAuto ? "Auto-checked: same tool is already running on this line. Click to override." : undefined}
                      className={`relative px-1 py-2.5 rounded-md border-2 transition-all flex flex-col items-center gap-0.5 ${
                        isNA
                          ? "bg-slate-400 border-slate-500 text-white shadow-sm hover:bg-slate-500"
                          : isAuto
                          ? "bg-sky-500 border-sky-600 text-white shadow-sm hover:bg-sky-600"
                          : ok
                          ? "bg-emerald-500 border-emerald-600 text-white shadow-sm hover:bg-emerald-600"
                          : "bg-white border-rose-300 text-rose-700 hover:border-rose-500"
                      }`}
                    >
                      {ok && <Check className="absolute top-1 right-1 w-3 h-3" strokeWidth={3} />}
                      {isNA && (
                        <span className="absolute top-1 left-1 text-[8px] font-bold uppercase tracking-wider bg-white/30 px-1 rounded-sm leading-tight">N/A</span>
                      )}
                      {!isNA && isAuto && (
                        <span className="absolute top-1 left-1 text-[8px] font-bold uppercase tracking-wider bg-white/30 px-1 rounded-sm leading-tight">AUTO</span>
                      )}
                      <I className="w-4 h-4" />
                      <span className="text-[11px] font-semibold leading-tight">{READINESS_LABELS[k]}</span>
                      {k === "tool" && (
                        <span className={`text-[10px] font-mono leading-tight ${ok ? (isNA ? "text-slate-100" : isAuto ? "text-sky-50" : "text-emerald-50") : "text-rose-600"}`}>
                          {toolId || (isNA ? "none" : "—")}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
              {!ready && (
                <div className="text-[10px] text-rose-700 mt-2 italic">Cannot move to In Progress until all 3 are checked.</div>
              )}
              {(row.readiness?.tool?.na === true) && (
                <div className="text-[10px] text-slate-500 mt-2 italic">
                  ⓘ No tool required for this WO — Tool check auto-cleared.
                </div>
              )}
              {(row.readiness?.tool?.auto === true && !row.readiness?.tool?.na) && (
                <div className="text-[10px] text-sky-700 mt-2 italic">
                  ⓘ Tool auto-checked: same tool is already running on {row.resource}. Click the Tool button to override.
                </div>
              )}
            </div>
          )}


                    {/* Shift entry — only for production-active WOs (todo & wip) */}
          {(row.status === "todo" || row.status === "wip") && (
            <ShiftEntryPanel row={row} logShiftEntry={logShiftEntry} />
          )}

          {/* Context actions */}
          {row.status === "wip" && false && (
            <button
              onClick={cutShortToAbr}
              className="w-full px-3 py-2.5 bg-orange-50 border border-orange-300 text-orange-800 hover:bg-orange-100 rounded-md text-sm font-medium flex items-center justify-center gap-2 transition-colors"
            >
              <Scissors className="w-4 h-4" />
              Cut Short → Awaiting Batch Record
            </button>
          )}

          {row.status === "abr" && (
            <button onClick={reopenAbr} className="w-full px-3 py-2 bg-stone-50 border border-stone-300 text-slate-700 hover:bg-stone-100 rounded-md text-xs font-medium flex items-center justify-center gap-2">
              Reopen → In Progress
            </button>
          )}

          {row.status === "brs" && (
            <button onClick={reopenBrs} className="w-full px-3 py-2 bg-stone-50 border border-stone-300 text-slate-700 hover:bg-stone-100 rounded-md text-xs font-medium flex items-center justify-center gap-2">
              Send back → Awaiting BR
            </button>
          )}

          <div>
            <div className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2">Status Override</div>
            <div className="grid grid-cols-5 gap-1">
              {[["todo", "Queued"], ["wip", "WIP"], ["abr", "Await"], ["brs", "Submit"], ["done", "Done"]].map(([key, label]) => {
                const m = STATUS[key];
                const isActive = row.status === key;
                const isWipBlocked = key === "wip" && row.status !== "wip" && !ready;
                return (
                  <button
                    key={key}
                    onClick={() => updateRow(row, { status: key })}
                    disabled={isWipBlocked}
                    title={isWipBlocked ? "Complete readiness checks first" : ""}
                    className={`px-1 py-2 text-[10px] font-medium rounded-md border-2 transition-all flex flex-col items-center gap-1 ${
                      isActive ? `${m.border} bg-white shadow-sm`
                      : isWipBlocked ? "border-stone-200 bg-stone-100 text-slate-400 cursor-not-allowed"
                      : "border-stone-200 bg-stone-50 hover:border-stone-300"
                    }`}
                  >
                    {key === "abr" ? <Flag className="w-3 h-3 fill-yellow-400 text-yellow-700" />
                     : key === "brs" ? <FileCheck2 className="w-3 h-3 text-indigo-600" />
                     : <span className={`w-3 h-3 rounded-full ${m.dot}`} />}
                    {label}
                  </button>
                );
              })}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <Field label="Run Hrs" value={fmtNum(row.run_hrs)} />
            <Field label="Labor Hrs" value={fmtNum(row.labr_hrs)} />
            <Field label="Crew Size" value={fmtNum(row.crew)} />
            <Field label="QA / P-V-D" value={[row.qa, row.pvd].filter(Boolean).join(" / ") || "—"} />
          </div>

          <div>
            <div className="flex items-baseline justify-between mb-1.5">
              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Completed Qty <span className="text-slate-400 normal-case font-normal">(manual)</span></div>
              <div className="text-xs text-slate-500 tabular-nums">target {fmtNum(row.start_qty)}</div>
            </div>
            <div className="flex items-stretch gap-2">
              <input type="number" value={qtyInput} onChange={e => setQtyInput(e.target.value)} onBlur={handleQtySave} onKeyDown={e => { if (e.key === "Enter") { handleQtySave(); e.target.blur(); } }} className="flex-1 px-3 py-2 text-base font-mono border border-stone-300 rounded-md focus:outline-none focus:border-slate-500" />
              <button onClick={handleQtySave} className="px-3 py-2 text-xs font-semibold bg-slate-900 text-white rounded-md hover:bg-slate-800">Save</button>
            </div>
            <div className="h-2 bg-stone-100 rounded-full overflow-hidden mt-2">
              <div className="h-full bg-emerald-500/85" style={{ width: `${pct}%` }} />
            </div>
            <div className="text-[10px] text-slate-500 mt-1 tabular-nums">{pct.toFixed(1)}% complete</div>
          </div>

          {row.comments && (
            <div>
              <div className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-1">Comments</div>
              <div className="text-sm text-slate-900 bg-stone-50 border border-stone-200 rounded-md px-3 py-2">{row.comments}</div>
            </div>
          )}
        </div>
      </aside>
    </>
  );
}

function Field({ label, value }) {
  return (
    <div>
      <div className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">{label}</div>
      <div className="text-sm text-slate-900 tabular-nums">{value}</div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<BuildTracker />);
  </script>
</body>
</html>
