<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

// ── Shift code → human label map ─────────────────────────────────────────
const SHIFT_MAP = {
  "ASSEMBLY 1":     "Midnights",
  "ASSEMBLY 2":     "Days",
  "ASSEMBLY 3":     "Afternoons",
  "EXTRUDER 1":     "Midnights",
  "EXTRUDER 2":     "Days",
  "EXTRUDER 3":     "Afternoons",
  "CONT A":         "Continental Days",
  "CONT B":         "Continental Days",
  "CONT C":         "Continental Nights",
  "CONT D":         "Continental Nights",
  "CONT A- Mold":   "Continental Days",
  "CONT B - Mold":  "Continental Days",
  "CONT C - Mold":  "Continental Nights",
  "CONT D - Mold":  "Continental Nights",
  "Grinder 1":      "Midnights",
  "Grinder 2":      "Days",
  "Grinder 3":      "Afternoons",
  "MOLDING 1":      "Midnights",
  "MOLDING 2":      "Days",
  "MOLDING 3":      "Afternoons",
};

// ── Excel parser (unchanged) ─────────────────────────────────────────────
function parseExcelToRows(workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
  if (raw.length < 2) return [];

  const header = raw[0].map(h => String(h || "").trim().toUpperCase());
  const colIdx = (names, fallback) => {
    for (const name of names) { const idx = header.indexOf(name); if (idx >= 0) return idx; }
    return fallback;
  };

  const COL_DATE     = colIdx(["TRANSACTION_DATE", "DATE"],          2);
  const COL_RESOURCE = colIdx(["RESOURCE_ID", "RESOURCE"],           3);
  const COL_HRS      = colIdx(["HOURS_WORKED", "HRS", "HOURS"],      4);
  const COL_QTY      = colIdx(["GOOD_QTY", "QTY", "UNITS"],          7);
  const COL_SHIFT    = colIdx(["ID", "SHIFT", "SHIFT_CODE"],         11);
  const COL_EARNED   = colIdx(["EARNED", "EARNED_HRS"],              19);
  const COL_LEAD     = colIdx(["BU", "UNIT LEAD", "UNIT_LEAD"],      46);

  console.log("Column indices → SHIFT:", COL_SHIFT, "header:", header[COL_SHIFT], "| BU:", COL_LEAD, "header:", header[COL_LEAD]);
  const rows = [];
  for (let i = 1; i < raw.length; i++) {
    const r = raw[i];
    const unitLead = String(r[COL_LEAD] || "").trim();
    if (!unitLead) continue;

    let dateVal = r[COL_DATE];
    let dateStr = "";
    if (typeof dateVal === "number") {
      const d = new Date(Math.round((dateVal - 25569) * 86400 * 1000));
      dateStr = d.toISOString().slice(0, 10);
    } else if (dateVal) {
      const d = new Date(dateVal);
      if (!isNaN(d)) dateStr = d.toISOString().slice(0, 10);
      else dateStr = String(dateVal).trim();
    }
    if (!dateStr) continue;

    const resource  = String(r[COL_RESOURCE] || "").trim();
    const hrs       = parseFloat(r[COL_HRS])    || 0;
    const qty       = parseFloat(r[COL_QTY])    || 0;
    const shiftCode = String(r[COL_SHIFT] || "").trim();
    const earned    = parseFloat(r[COL_EARNED]) || 0;
    const shift     = SHIFT_MAP[shiftCode] || shiftCode;

    if (!resource) continue;
    rows.push({ date: dateStr, resource, hrs, qty, wo: "", shiftCode, shift, earned, unitLead });
  }
  return rows;
}

// ── Firebase helpers ─────────────────────────────────────────────────────
const DOC_REF = db.collection("production_data").doc("latest");

async function saveToFirebase(rows, fileName) {
  // Firestore docs max ~1MB. Split rows into chunks of 500 and store as array.
  // For simplicity we store everything in one doc as a JSON string (≤ 5MB limit is fine for typical exports).
  const payload = {
    rows: rows,
    uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
    uploadedBy: "web-upload",
    fileName: fileName,
    rowCount: rows.length,
  };
  await DOC_REF.set(payload);
}

async function loadFromFirebase() {
  const snap = await DOC_REF.get();
  if (!snap.exists) return null;
  return snap.data();
}

// ── Constants ────────────────────────────────────────────────────────────
const SHIFT_ORDER = ["Midnights", "Days", "Afternoons", "Continental Days", "Continental Nights"];
const TARGET_EFF = 90;

const fmtNum = (n) => Math.round(n).toLocaleString();
const fmtHrs = (n) => n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
const fmtPct = (n) => `${n.toFixed(1)}%`;
const fmtPPH = (n) => n.toFixed(1);

const effColors = (eff) => {
  if (eff >= TARGET_EFF) return { text: "text-emerald-700", bg: "bg-emerald-50", border: "border-emerald-200" };
  if (eff >= TARGET_EFF * 0.85) return { text: "text-amber-700", bg: "bg-amber-50", border: "border-amber-200" };
  return { text: "text-rose-700", bg: "bg-rose-50", border: "border-rose-200" };
};

// ── MultiSelect component (unchanged) ────────────────────────────────────
function MultiSelect({ label, options, selected, onChange, allLabel = "All" }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const allSelected = selected.length === 0;
  const displayLabel = allSelected
    ? allLabel
    : selected.length === 1
    ? selected[0]
    : `${selected.length} selected`;

  const toggle = (val) => {
    if (selected.includes(val)) onChange(selected.filter(v => v !== val));
    else onChange([...selected, val]);
  };

  return (
    <div className="relative no-print" ref={ref}>
      <label className="text-[10px] font-semibold uppercase tracking-wider text-slate-500 block mb-1">{label}</label>
      <button
        onClick={() => setOpen(v => !v)}
        className="flex items-center gap-2 px-3 py-2 text-sm border border-stone-300 rounded-md bg-white min-w-[160px] text-left hover:border-stone-400"
      >
        <span className={`flex-1 ${allSelected ? "text-slate-500" : "text-slate-900 font-medium"}`}>{displayLabel}</span>
        <svg className={`w-4 h-4 text-slate-400 shrink-0 transition-transform ${open ? "rotate-180" : ""}`} viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.25 4.39a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z" clipRule="evenodd"/>
        </svg>
      </button>
      {open && (
        <div className="absolute top-full left-0 mt-1 z-50 bg-white border border-stone-200 rounded-lg shadow-xl min-w-[200px] max-h-72 overflow-y-auto py-1">
          <button
            onClick={() => { onChange([]); }}
            className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-stone-50 ${allSelected ? "font-semibold text-blue-700" : "text-slate-600"}`}
          >
            <span className={`w-4 h-4 rounded border-2 flex items-center justify-center shrink-0 ${allSelected ? "bg-blue-600 border-blue-600" : "border-stone-300"}`}>
              {allSelected && <svg className="w-3 h-3 text-white" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>}
            </span>
            {allLabel}
          </button>
          <div className="border-t border-stone-100 my-1"/>
          {options.map(opt => {
            const checked = selected.includes(opt);
            return (
              <button
                key={opt}
                onClick={() => toggle(opt)}
                className="w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-stone-50"
              >
                <span className={`w-4 h-4 rounded border-2 flex items-center justify-center shrink-0 ${checked ? "bg-blue-600 border-blue-600" : "border-stone-300"}`}>
                  {checked && <svg className="w-3 h-3 text-white" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>}
                </span>
                <span className={checked ? "text-slate-900 font-medium" : "text-slate-700"}>{opt}</span>
              </button>
            );
          })}
          {selected.length > 0 && (
            <>
              <div className="border-t border-stone-100 my-1"/>
              <button onClick={() => onChange([])} className="w-full text-left px-3 py-2 text-xs text-slate-400 hover:text-rose-600">Clear selection</button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── Main component ────────────────────────────────────────────────────────
function ProductionReportTool() {
  const [allRows, setAllRows] = React.useState([]);
  const [fbStatus, setFbStatus] = React.useState("loading"); // "loading" | "ready" | "empty" | "error"
  const [uploadStatus, setUploadStatus] = React.useState(null); // null | "saving" | {ok, msg}
  const [lastUpdated, setLastUpdated] = React.useState(null);
  const [lastFileName, setLastFileName] = React.useState(null);
  const fileInputRef = React.useRef(null);

  // ── Load from Firebase on mount ────────────────────────────────────────
  React.useEffect(() => {
    setFbStatus("loading");
    loadFromFirebase()
      .then(data => {
        if (!data || !data.rows || data.rows.length === 0) {
          setFbStatus("empty");
        } else {
          setAllRows(data.rows);
          setLastUpdated(data.uploadedAt ? data.uploadedAt.toDate() : null);
          setLastFileName(data.fileName || null);
          setFbStatus("ready");
        }
      })
      .catch(err => {
        console.error("Firebase load error:", err);
        setFbStatus("error");
      });
  }, []);

  // ── Handle Excel upload → parse → save to Firebase ─────────────────────
  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus("saving");
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const rows = parseExcelToRows(wb);
        if (rows.length === 0) {
          setUploadStatus({ ok: false, msg: "No rows found. Check column AT contains Unit Lead names." });
          return;
        }
        // Save to Firebase
        await saveToFirebase(rows, file.name);
        setAllRows(rows);
        setLastUpdated(new Date());
        setLastFileName(file.name);
        setFbStatus("ready");
        setUploadStatus({ ok: true, msg: `Saved ${rows.length.toLocaleString()} rows · everyone can now see the update` });
      } catch (err) {
        console.error("Upload error:", err);
        setUploadStatus({ ok: false, msg: "Error: " + err.message });
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  // ── Derived data ───────────────────────────────────────────────────────
  const allDates = React.useMemo(() => [...new Set(allRows.map(r => r.date))].sort(), [allRows]);
  const minDate = allDates[0] || "";
  const maxDate = allDates[allDates.length - 1] || "";

  const allUnitLeaders = React.useMemo(() => [...new Set(allRows.map(r => r.unitLead).filter(Boolean))].sort(), [allRows]);

  // Shifts present in data, sorted by the canonical order
  const allShifts = React.useMemo(() => {
    const inData = new Set(allRows.map(r => r.shift).filter(Boolean));
    return SHIFT_ORDER.filter(s => inData.has(s));
  }, [allRows]);

  // Filter state
  const [dateMode, setDateMode] = React.useState("single");
  const [singleDate, setSingleDate] = React.useState("");
  const [rangeStart, setRangeStart] = React.useState("");
  const [rangeEnd, setRangeEnd] = React.useState("");
  const [selectedShifts, setSelectedShifts] = React.useState([]);
  const [selectedResources, setSelectedResources] = React.useState([]);
  const [selectedUnitLeaders, setSelectedUnitLeaders] = React.useState([]);

  // Update default date when data loads
  React.useEffect(() => {
    if (maxDate) {
      setSingleDate(maxDate);
      setRangeStart(maxDate);
      setRangeEnd(maxDate);
    }
  }, [maxDate]);

  const availableResources = React.useMemo(() => {
    const rows = selectedUnitLeaders.length > 0
      ? allRows.filter(r => selectedUnitLeaders.includes(r.unitLead))
      : allRows;
    return [...new Set(rows.map(r => r.resource))].sort();
  }, [allRows, selectedUnitLeaders]);

  React.useEffect(() => {
    const invalid = selectedResources.filter(r => !availableResources.includes(r));
    if (invalid.length > 0) setSelectedResources(prev => prev.filter(r => availableResources.includes(r)));
  }, [availableResources]);

  const applyPreset = (preset) => {
    // Helper: clamp a date string to available data range
    const clamp = (d) => {
      if (d < minDate) return minDate;
      if (d > maxDate) return maxDate;
      return d;
    };
    const toISO = (d) => d.toISOString().slice(0, 10);

    const now = new Date(maxDate + "T00:00:00");

    if (preset === "today") {
      setDateMode("single"); setSingleDate(maxDate);
    } else if (preset === "yesterday") {
      const y = new Date(now); y.setDate(y.getDate() - 1);
      setDateMode("single"); setSingleDate(clamp(toISO(y)));
    } else if (preset === "thisweek") {
      // Week starts Sunday
      const day = now.getDay(); // 0=Sun
      const sun = new Date(now); sun.setDate(now.getDate() - day);
      setDateMode("range"); setRangeStart(clamp(toISO(sun))); setRangeEnd(maxDate);
    } else if (preset === "lastweek") {
      const day = now.getDay();
      const thisSun = new Date(now); thisSun.setDate(now.getDate() - day);
      const lastSun = new Date(thisSun); lastSun.setDate(thisSun.getDate() - 7);
      const lastSat = new Date(thisSun); lastSat.setDate(thisSun.getDate() - 1);
      setDateMode("range"); setRangeStart(clamp(toISO(lastSun))); setRangeEnd(clamp(toISO(lastSat)));
    } else if (preset === "thismonth") {
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      setDateMode("range"); setRangeStart(clamp(toISO(first))); setRangeEnd(maxDate);
    } else if (preset === "lastmonth") {
      const first = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const last  = new Date(now.getFullYear(), now.getMonth(), 0);
      setDateMode("range"); setRangeStart(clamp(toISO(first))); setRangeEnd(clamp(toISO(last)));
    }
  };

  const filteredRows = React.useMemo(() => {
    if (!singleDate && !rangeStart) return [];
    const startD = dateMode === "single" ? singleDate : rangeStart;
    const endD   = dateMode === "single" ? singleDate : rangeEnd;
    return allRows.filter(r => {
      if (r.date < startD || r.date > endD) return false;
      if (selectedShifts.length > 0 && !selectedShifts.includes(r.shift)) return false;
      if (selectedResources.length > 0 && !selectedResources.includes(r.resource)) return false;
      if (selectedUnitLeaders.length > 0 && !selectedUnitLeaders.includes(r.unitLead)) return false;
      return true;
    });
  }, [allRows, dateMode, singleDate, rangeStart, rangeEnd, selectedShifts, selectedResources, selectedUnitLeaders]);

  const totals = React.useMemo(() => {
    let qty = 0, earned = 0, hours = 0;
    for (const r of filteredRows) { qty += r.qty; earned += r.earned; hours += r.hrs; }
    return { qty, earned, hours, eff: hours ? (earned/hours*100) : 0, pph: hours ? (qty/hours) : 0 };
  }, [filteredRows]);

  const byShift = React.useMemo(() => {
    const map = new Map();
    for (const r of filteredRows) {
      if (!map.has(r.shift)) map.set(r.shift, { qty:0, earned:0, hours:0 });
      const g = map.get(r.shift);
      g.qty += r.qty; g.earned += r.earned; g.hours += r.hrs;
    }
    return map;
  }, [filteredRows]);

  const byResource = React.useMemo(() => {
    const map = new Map();
    for (const r of filteredRows) {
      if (!map.has(r.resource)) map.set(r.resource, { qty:0, earned:0, hours:0, shifts: new Map() });
      const g = map.get(r.resource);
      g.qty += r.qty; g.earned += r.earned; g.hours += r.hrs;
      if (!g.shifts.has(r.shift)) g.shifts.set(r.shift, { qty:0, hours:0 });
      const s = g.shifts.get(r.shift);
      s.qty += r.qty; s.hours += r.hrs;
    }
    return [...map.entries()].sort((a,b) => b[1].qty - a[1].qty);
  }, [filteredRows]);

  const totalColors = effColors(totals.eff);

  const filterSummary = [
    selectedUnitLeaders.length > 0 && `${selectedUnitLeaders.length === 1 ? selectedUnitLeaders[0] : selectedUnitLeaders.length + " leads"}`,
    selectedShifts.length > 0 && `${selectedShifts.join(", ")}`,
    selectedResources.length > 0 && `${selectedResources.length === 1 ? selectedResources[0] : selectedResources.length + " lines"}`,
  ].filter(Boolean).join(" · ");

  const dateLabel = () => {
    if (!singleDate && !rangeStart) return "Loading…";
    if (dateMode === "single") {
      const d = new Date(singleDate + "T00:00:00");
      return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    }
    const s = new Date(rangeStart + "T00:00:00");
    const e = new Date(rangeEnd + "T00:00:00");
    if (rangeStart === rangeEnd) return s.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    return `${s.toLocaleDateString(undefined, { month:"short", day:"numeric" })} – ${e.toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" })}`;
  };

  const showShiftCards = selectedShifts.length === 0;

  // ── Loading / empty states ─────────────────────────────────────────────
  if (fbStatus === "loading") {
    return (
      <div className="min-h-screen bg-stone-50 flex items-center justify-center">
        <div className="text-center">
          <div className="text-2xl mb-2">⏳</div>
          <div className="text-sm text-slate-500">Loading data from Firebase…</div>
        </div>
      </div>
    );
  }

  if (fbStatus === "error") {
    return (
      <div className="min-h-screen bg-stone-50 flex items-center justify-center">
        <div className="text-center max-w-sm">
          <div className="text-2xl mb-2">⚠️</div>
          <div className="text-sm font-semibold text-rose-700 mb-1">Could not connect to Firebase</div>
          <div className="text-xs text-slate-500">Check your Firestore is in test mode and the config is correct. See the browser console for details.</div>
        </div>
      </div>
    );
  }

  if (fbStatus === "empty") {
    return (
      <div className="min-h-screen bg-stone-50 flex items-center justify-center">
        <div className="text-center max-w-sm">
          <div className="text-3xl mb-3">📂</div>
          <div className="text-base font-semibold text-slate-700 mb-1">No data yet</div>
          <div className="text-sm text-slate-500 mb-4">Upload your first Excel export to get started. It will be saved to Firebase and everyone will see it immediately.</div>
          <input ref={fileInputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={handleFileUpload}/>
          <button
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            className="px-4 py-2.5 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800"
          >
            📂 Upload Excel File
          </button>
          {uploadStatus && uploadStatus !== "saving" && (
            <div className={`mt-3 text-xs ${uploadStatus.ok ? "text-emerald-700" : "text-rose-700"}`}>{uploadStatus.msg}</div>
          )}
          {uploadStatus === "saving" && <div className="mt-3 text-xs text-blue-700">⏳ Saving to Firebase…</div>}
        </div>
      </div>
    );
  }

  // ── Main UI ────────────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-stone-50 text-slate-900" style={{ fontFamily: "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" }}>

      {/* Header */}
      <header className="border-b border-stone-200 bg-white sticky top-0 z-30 shadow-sm no-print">
        <div className="px-4 md:px-6 py-3 flex items-center gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-slate-900 text-white rounded-md flex items-center justify-center font-bold text-sm tracking-tight">P/R</div>
            <div>
              <div className="text-sm font-semibold text-slate-900">Production Report Tool</div>
              <div className="text-[11px] text-slate-500">
                PPH = Units ÷ Hours · Efficiency = Earned ÷ Hours · Target {TARGET_EFF}%
                {lastUpdated && (
                  <span className="ml-2 text-emerald-600 font-medium">
                    · 🔄 Updated {lastUpdated.toLocaleString()}{lastFileName ? ` (${lastFileName})` : ""}
                  </span>
                )}
              </div>
            </div>
          </div>
          <div className="ml-auto flex items-center gap-2 flex-wrap">
            {uploadStatus && uploadStatus !== "saving" && (
              <span className={`text-[11px] px-2 py-1 rounded font-medium ${uploadStatus.ok ? "bg-emerald-50 text-emerald-700 border border-emerald-200" : "bg-rose-50 text-rose-700 border border-rose-200"}`}>
                {uploadStatus.ok ? "✓ " : "✕ "}{uploadStatus.msg}
              </span>
            )}
            {uploadStatus === "saving" && (
              <span className="text-[11px] px-2 py-1 rounded font-medium bg-blue-100 text-blue-700 border border-blue-600">
                ⏳ Saving to Firebase…
              </span>
            )}
            <input ref={fileInputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={handleFileUpload}/>
            <button
              onClick={() => fileInputRef.current && fileInputRef.current.click()}
              className="flex items-center gap-1.5 px-3 py-2 rounded-md border border-stone-300 hover:border-stone-400 bg-white text-slate-700 text-xs font-semibold hover:text-slate-500"
            >
              📂 Upload & Save to Firebase
            </button>
            <button onClick={() => window.print()} className="flex items-center gap-1.5 px-3 py-2 rounded-md bg-slate-900 hover:bg-slate-800 text-white text-xs font-semibold">
              🖨 Print / Save PDF
            </button>
            <a href="https://goshotrifonov.github.io/report/BuildTracker.html" target="_blank" rel="noopener noreferrer"
              className="flex items-center gap-1.5 px-3 py-2 rounded-md border border-stone-300 hover:border-stone-400 bg-white text-slate-700 text-xs font-semibold">
              📋 Build Tracker
            </a>
          </div>
        </div>
      </header>

      {/* Filter bar */}
      <div className="bg-white border-b border-stone-200 no-print">
        <div className="px-4 md:px-6 py-4 flex flex-wrap items-end gap-4">

          <div>
            <label className="text-[10px] font-semibold uppercase tracking-wider text-slate-500 block mb-1">Date</label>
            <div className="flex items-center gap-2">
              <div className="flex rounded-md border border-stone-300 overflow-hidden">
                <button onClick={() => setDateMode("single")} className={`px-3 py-2 text-xs font-semibold ${dateMode==="single" ? "bg-slate-900 text-white" : "bg-white text-slate-600 hover:bg-stone-50"}`}>Single day</button>
                <button onClick={() => setDateMode("range")} className={`px-3 py-2 text-xs font-semibold border-l border-stone-300 ${dateMode==="range" ? "bg-slate-900 text-white" : "bg-white text-slate-600 hover:bg-stone-50"}`}>Range</button>
              </div>
              {dateMode === "single" ? (
                <input type="date" value={singleDate} min={minDate} max={maxDate} onChange={e => setSingleDate(e.target.value)} className="px-3 py-2 text-sm border border-stone-300 rounded-md bg-white"/>
              ) : (
                <>
                  <input type="date" value={rangeStart} min={minDate} max={rangeEnd} onChange={e => setRangeStart(e.target.value)} className="px-3 py-2 text-sm border border-stone-300 rounded-md bg-white"/>
                  <span className="text-slate-400 text-sm">to</span>
                  <input type="date" value={rangeEnd} min={rangeStart} max={maxDate} onChange={e => setRangeEnd(e.target.value)} className="px-3 py-2 text-sm border border-stone-300 rounded-md bg-white"/>
                </>
              )}
            </div>
          </div>

          <div>
            <label className="text-[10px] font-semibold uppercase tracking-wider text-slate-500 block mb-1">Quick range</label>
            <div className="flex gap-1.5">
              {[["today","Today"],["yesterday","Yesterday"],["thisweek","This week"],["lastweek","Last week"],["thismonth","This month"],["lastmonth","Last month"]].map(([k,l]) => (
                <button key={k} onClick={() => applyPreset(k)} className="px-2.5 py-2 text-xs font-medium border border-stone-300 rounded-md bg-white hover:bg-stone-50 text-slate-600">{l}</button>
              ))}
            </div>
          </div>

          <MultiSelect label="Business Unit" options={allUnitLeaders} selected={selectedUnitLeaders} onChange={setSelectedUnitLeaders} allLabel="All BUs"/>
          <MultiSelect label="Shift" options={allShifts} selected={selectedShifts} onChange={setSelectedShifts} allLabel="All shifts"/>
          <MultiSelect label="Line" options={availableResources} selected={selectedResources} onChange={setSelectedResources} allLabel="All lines"/>

          {(selectedUnitLeaders.length > 0 || selectedShifts.length > 0 || selectedResources.length > 0) && (
            <div className="flex flex-wrap gap-1.5 items-center pt-5">
              {selectedUnitLeaders.map(u => (
                <span key={u} className="flex items-center gap-1 px-2 py-0.5 rounded-full bg-blue-100 text-blue-800 text-xs font-medium">
                  🏭 {u}
                  <button onClick={() => setSelectedUnitLeaders(selectedUnitLeaders.filter(x => x !== u))} className="hover:text-blue-600 ml-0.5">×</button>
                </span>
              ))}
              {selectedShifts.map(s => (
                <span key={s} className="flex items-center gap-1 px-2 py-0.5 rounded-full bg-blue-100 text-blue-800 text-xs font-medium">
                  {s}
                  <button onClick={() => setSelectedShifts(selectedShifts.filter(x => x !== s))} className="hover:text-blue-600 ml-0.5">×</button>
                </span>
              ))}
              {selectedResources.map(r => (
                <span key={r} className="flex items-center gap-1 px-2 py-0.5 rounded-full bg-slate-100 text-slate-700 text-xs font-medium">
                  {r}
                  <button onClick={() => setSelectedResources(selectedResources.filter(x => x !== r))} className="hover:text-slate-500 ml-0.5">×</button>
                </span>
              ))}
              <button onClick={() => { setSelectedUnitLeaders([]); setSelectedShifts([]); setSelectedResources([]); }} className="text-xs text-slate-400 hover:text-rose-600 ml-1">Clear all</button>
            </div>
          )}
        </div>
      </div>

      {/* Report body */}
      <div className="px-4 md:px-6 py-6 max-w-6xl mx-auto">

        <div className="hidden print:block mb-4 pb-3 border-b-2 border-slate-900">
          <div className="text-xl font-bold">Production Report — BU Verathon · George</div>
          <div className="text-sm text-slate-600">{dateLabel()}{filterSummary ? ` · ${filterSummary}` : ""}</div>
          <div className="text-xs text-slate-400 mt-1">Generated {new Date().toLocaleString()} · {filteredRows.length.toLocaleString()} records</div>
        </div>

        <div className="no-print">
          <div className="text-xs text-slate-400 mb-1">{filteredRows.length.toLocaleString()} records in current filter</div>
          <h1 className="text-2xl font-bold text-slate-900 mb-0.5">{dateLabel()}</h1>
          <div className="text-sm text-slate-500 mb-6">BU Verathon · George{filterSummary ? ` · ${filterSummary}` : ""}</div>
        </div>

        {/* Summary tiles */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <SummaryTile label="Total Units" value={fmtNum(totals.qty)} />
          <SummaryTile label="Hours Worked" value={fmtHrs(totals.hours)} />
          <SummaryTile label="Parts Per Hour" value={fmtPPH(totals.pph)} sub="PPH = Units ÷ Hours" />
          <SummaryTile label="Efficiency" value={fmtPct(totals.eff)} sub={`Target ${TARGET_EFF}%`} colors={totalColors} />
        </div>

        {/* By shift */}
        {showShiftCards && byShift.size > 0 && (
          <>
            <SectionTitle>By Shift</SectionTitle>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6">
              {SHIFT_ORDER.filter(s => byShift.has(s)).map(s => {
                const d = byShift.get(s);
                const eff = d.hours ? (d.earned/d.hours*100) : 0;
                const pph = d.hours ? (d.qty/d.hours) : 0;
                const c = effColors(eff);
                return (
                  <div key={s} className={`rounded-lg border px-3 py-2.5 ${c.bg} ${c.border}`}>
                    <div className="text-[11px] font-bold text-slate-700">{s}</div>
                    <div className="text-lg font-bold text-slate-900">{fmtNum(d.qty)} <span className="text-[10px] font-normal text-slate-400">units</span></div>
                    <div className="text-[10px] text-slate-500 mt-0.5">{fmtHrs(d.hours)}h · PPH {fmtPPH(pph)}</div>
                    <div className={`text-sm font-bold mt-1 ${c.text}`}>{fmtPct(eff)}</div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* By resource */}
        <SectionTitle>By Resource Line</SectionTitle>
        {byResource.length === 0 ? (
          <div className="text-center py-10 text-sm text-slate-400 italic">No data for the current filter selection.</div>
        ) : (
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-slate-900 text-white text-[10px] uppercase tracking-wider">
                <th className="text-left px-3 py-2.5 rounded-l-md">Resource</th>
                <th className="text-right px-3 py-2.5">Units</th>
                <th className="text-right px-3 py-2.5">Hrs Worked</th>
                <th className="text-right px-3 py-2.5">PPH</th>
                <th className="text-right px-3 py-2.5 rounded-r-md">Efficiency</th>
              </tr>
            </thead>
            <tbody>
              {byResource.map(([res, d], i) => {
                const eff = d.hours ? (d.earned/d.hours*100) : 0;
                const pph = d.hours ? (d.qty/d.hours) : 0;
                const c = effColors(eff);
                const shiftParts = SHIFT_ORDER.filter(s => d.shifts.has(s)).map(s => {
                  const sd = d.shifts.get(s);
                  const spph = sd.hours ? (sd.qty/sd.hours) : 0;
                  return `${s}: ${fmtNum(sd.qty)}u (${fmtPPH(spph)} PPH)`;
                });
                return (
                  <React.Fragment key={res}>
                    <tr className={i % 2 === 0 ? "bg-stone-50" : "bg-white"}>
                      <td className="px-3 py-2 font-semibold text-slate-900">{res}</td>
                      <td className="px-3 py-2 text-right tabular-nums">{fmtNum(d.qty)}</td>
                      <td className="px-3 py-2 text-right tabular-nums">{fmtHrs(d.hours)}</td>
                      <td className="px-3 py-2 text-right tabular-nums font-semibold">{fmtPPH(pph)}</td>
                      <td className={`px-3 py-2 text-right font-bold tabular-nums ${c.text} ${c.bg}`}>{fmtPct(eff)}</td>
                    </tr>
                    {showShiftCards && (
                      <tr className={i % 2 === 0 ? "bg-stone-50" : "bg-white"}>
                        <td colSpan="5" className="px-3 pb-2 text-[10px] text-slate-400 italic border-b border-stone-200">{shiftParts.join(" · ")}</td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        )}

        <div className="mt-8 pt-4 border-t border-stone-200 text-center text-[10px] text-slate-400">
          Source: Build Tracker Labour Tickets export · PPH = Units ÷ Hours Worked · Efficiency = Earned ÷ Hours Worked · Target {TARGET_EFF}%
          {lastUpdated && ` · Data last updated ${lastUpdated.toLocaleString()}`}
        </div>
      </div>
    </div>
  );
}

function SummaryTile({ label, value, sub, colors }) {
  const c = colors || { text: "text-slate-900", bg: "bg-stone-50", border: "border-stone-200" };
  return (
    <div className={`rounded-lg border px-4 py-3 ${c.bg} ${c.border}`}>
      <div className="text-[10px] font-semibold uppercase tracking-wider text-slate-500">{label}</div>
      <div className={`text-2xl font-bold mt-0.5 ${c.text}`}>{value}</div>
      {sub && <div className="text-[10px] text-slate-400 mt-0.5">{sub}</div>}
    </div>
  );
}

function SectionTitle({ children }) {
  return <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wide mb-2 mt-8 pb-1.5 border-b border-stone-200">{children}</h2>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ProductionReportTool />);
</script>
</body>
</html>
